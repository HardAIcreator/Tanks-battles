// ═════════════════════ FIREBASE ═════════════════════
const firebaseConfig = {

// ═════════════════════ AUDIO ═════════════════════
let _ac=null;
const AC=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
function snd_shoot(l){try{const a=AC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);if(l){o.type='sawtooth';o.frequency.setValueAtTime(1400,a.currentTime);o.frequency.exponentialRampToValueAtTime(150,a.currentTime+0.35);g.gain.setValueAtTime(0.28,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.35);o.start();o.stop(a.currentTime+0.35)}else{o.type='square';o.frequency.setValueAtTime(380,a.currentTime);o.frequency.exponentialRampToValueAtTime(70,a.currentTime+0.1);g.gain.setValueAtTime(0.15,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.1);o.start();o.stop(a.currentTime+0.1)}}catch(e){}}
function snd_explode(b){try{const a=AC(),l=b?0.9:0.45;const u=a.createBuffer(1,a.sampleRate*l,a.sampleRate);const d=u.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,b?1.2:1.8);const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=b?550:850;s.buffer=u;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(b?1.1:0.65,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+l);s.start()}catch(e){}}
function snd_pickup(){try{const a=AC();[523,659,784,1047].forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.13,a.currentTime+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+i*0.07+0.12);o.connect(g);g.connect(a.destination);o.start(a.currentTime+i*0.07);o.stop(a.currentTime+i*0.07+0.12)})}catch(e){}}
function snd_countdown(g){try{const a=AC(),o=a.createOscillator(),gn=a.createGain();o.type='square';o.frequency.value=g?880:440;gn.gain.setValueAtTime(0.18,a.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.14);o.connect(gn);gn.connect(a.destination);o.start();o.stop(a.currentTime+0.14)}catch(e){}}
function snd_quake(){try{const a=AC(),l=1.5;const u=a.createBuffer(1,a.sampleRate*l,a.sampleRate);const d=u.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.5;const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='lowpass';f.frequency.value=120;s.buffer=u;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.9,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+l);s.start()}catch(e){}}

// ═════════════════════ CONSTANTS ═════════════════════
const B_TYPES=['triple','armor','laser','speed','mine','magnet','freeze'];
const B_COL={triple:'#ffd700',armor:'#00ffff',laser:'#ff00ff',speed:'#00ff88',mine:'#ff4444',magnet:'#cc44ff',freeze:'#88ddff'};
const B_SYM={triple:'✦',armor:'◆',laser:'⚡',speed:'▶▶',mine:'💣',magnet:'🧲',freeze:'❄'};
const B_NAME={triple:'ТРИПЛ',armor:'БРОНЯ',laser:'ЛАЗЕР',speed:'ТУРБО',mine:'МИНЫ',magnet:'МАГНИТ',freeze:'ЗАМОРОЗКА'};

// ═════════════════════ GLOBALS ═════════════════════
let canvas, ctx, animFrame;
let gameState='menu', lastTime=0, gameTime=0, bonusTimer=0;
let mapData=[], mapW=14, mapH=9;
let particles=[], bonusItems=[], bullets=[], tanks=[], mines=[], floatingTexts=[];
let joysticks={}, currentMode=0, shakeTimer=0, killCount=[0,0];
let weatherType='none', weatherTimer=0, weatherParts=[], quakeTimer=0, lastEventAt=0;
let onlineMode=false, myPlayerId=null, isHost=false, onlinePlayers={};
let gameSeed=0, hostId=null;

// ═════════════════════ MAP ═════════════════════
function genMapFromSeed(w,h,seed){
  const rng=((s)=>{return ()=>{s=(s*1664525+1013904223)&0xffffffff;return s/0xffffffff}})(seed);
  const m=[];
  for(let y=0;y<h;y++){
    m[y]=[];
    for(let x=0;x<w;x++) m[y][x]=(x===0||y===0||x===w-1||y===h-1)?{type:'steel',hp:999}:{type:'empty',hp:0};
  }
  for(let y=2;y<h-2;y++) for(let x=2;x<w-2;x++){
    if(rng()<0.16&&!(x<=3&&y<=3)&&!(x>=w-4&&y>=h-4)) m[y][x]={type:'brick',hp:WALL_HP};
  }
  for(let y=4;y<h-4;y+=4) for(let x=4;x<w-4;x+=4) m[y][x]={type:'steel',hp:999};
  return m;
}

// ═════════════════════ UTILS ═════════════════════
function wallAt(x,y){
  const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);
  if(tx<0||ty<0||tx>=mapW||ty>=mapH) return true;
  return mapData[ty]&&mapData[ty][tx]&&mapData[ty][tx].type!=='empty';
}
function angDiff(a,b){let d=a-b;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d;}
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}
function spawnP(x,y,color,n,speed,life,grav=0){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=speed*(0.4+Math.random()*0.6);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,size:2+Math.random()*4,grav});
  }
}
function spawnTxt(x,y,txt,col,sz=20){
  floatingTexts.push({x,y,txt,col,sz,life:1.3,maxLife:1.3,vy:-(38+Math.random()*18)});
}
function shake(n=1){shakeTimer=Math.max(shakeTimer,0.28*n);}
function flash(col='#fff',ms=100){
  const f=document.getElementById('flash');
  f.style.background=col; f.style.opacity='0.32';
  setTimeout(()=>f.style.opacity='0',ms);
}

// ═════════════════════ TANK CLASS ═════════════════════
class Tank{
  constructor(x,y,col,acc,idx,isBot=false){
    this.x=x;this.y=y;this.angle=0;this.col=col;this.acc=acc;this.idx=idx;
    this.lives=MAX_LIVES;this.alive=true;this.spd=TANK_SPEED;this.baseSpd=this.spd;
    this.scd=0;this.srate=0.48;this.bonus=null;this.bTimer=0;
    this.shield=false;this.frozen=false;this.frozenT=0;this.magnet=false;this.hitFlash=0;
    this.respawning=false;this.respawnT=0;this.kills=0;this.shots=0;
    this.tracks=[];this.trackT=0;this.isBot=isBot;
    if(isBot) this.spd=108;
  }
  get tx(){return Math.floor(this.x/TILE);}
  get ty(){return Math.floor(this.y/TILE);}
  applyBonus(type){
    this.bonus=type;this.bTimer=BONUS_DUR;
    this.shield=(type==='armor');this.magnet=(type==='magnet');
    this.spd=type==='speed'?this.baseSpd*1.85:type==='armor'?this.baseSpd*0.55:this.baseSpd;
    snd_pickup();spawnP(this.x,this.y,B_COL[type],28,140,0.7);
    spawnTxt(this.x,this.y-32,'+'+B_NAME[type],B_COL[type],15);
  }
  clearBonus(){
    this.bonus=null;this.shield=false;this.magnet=false;this.spd=this.baseSpd;
  }
  shoot(){
    if(this.scd>0||!this.alive||this.respawning||this.frozen) return;
    this.scd=this.srate;this.shots++;
    if(this.bonus==='triple'){
      [-0.3,0,0.3].forEach(a=>spawnBullet(this,this.angle+a));
    }else if(this.bonus==='laser'){
      fireLaser(this);
    }else if(this.bonus==='mine'){
      layMine(this);
    }else{
      spawnBullet(this,this.angle);
    }
    snd_shoot(this.bonus==='laser');
  }
  tryMove(dx,dy){
    const r=18,nx=this.x+dx,ny=this.y+dy;
    const ok=(x,y)=>!wallAt(x,y);
    if(ok(nx-r,ny-r)&&ok(nx+r,ny-r)&&ok(nx-r,ny+r)&&ok(nx+r,ny+r)){this.x=nx;this.y=ny;}
    else if(ok(nx-r,this.y-r)&&ok(nx+r,this.y-r)&&ok(nx-r,this.y+r)&&ok(nx+r,this.y+r)){this.x=nx;}
    else if(ok(this.x-r,ny-r)&&ok(this.x+r,ny-r)&&ok(this.x-r,ny+r)&&ok(this.x+r,ny+r)){this.y=ny;}
  }
  hit(dmg,from){
    if(this.shield){spawnP(this.x,this.y,'#00ffff',10,90,0.4);return 'bounced';}
    this.hitFlash=0.14;this.lives=Math.max(0,this.lives-dmg);
    spawnP(this.x,this.y,this.col,16,115,0.65);
    if(this.lives<=0){this.die(from);return 'dead';}
    return 'hit';
  }
  die(killer){
    this.alive=false;
    if(killer){killer.kills++;spawnTxt(this.x,this.y-44,'БАБАХ!','#ff4444',22);}
    spawnP(this.x,this.y,this.col,55,210,1.6,35);
    spawnP(this.x,this.y,'#ff8800',28,155,1.1,22);
    spawnP(this.x,this.y,'#ffff00',18,110,0.7,10);
    snd_explode(true);shake(1.6);flash('#ff4400',220);
    if(Math.random()<0.55) spawnBonusAt(this.x,this.y);
  }
  update(dt){
    if(this.respawning){this.respawnT-=dt;if(this.respawnT<=0){this.respawning=false;this.alive=true;}return;}
    if(!this.alive) return;
    if(this.scd>0)this.scd-=dt;
    if(this.hitFlash>0)this.hitFlash-=dt;
    if(this.frozen){this.frozenT-=dt;if(this.frozenT<=0)this.frozen=false;return;}
    if(this.bTimer>0){this.bTimer-=dt*1000;if(this.bTimer<=0)this.clearBonus();}
    if(this.magnet){
      for(const b of bonusItems){
        if(!b.alive)continue;
        const dx=this.x-b.x,dy=this.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<TILE*6&&d>2){b.x+=dx/d*TILE*2.8*dt;b.y+=dy/d*TILE*2.8*dt;}
      }
    }
    this.trackT-=dt;
    if(this.trackT<=0){this.trackT=0.12;this.tracks.push({x:this.x,y:this.y,angle:this.angle,life:1.6});if(this.tracks.length>28)this.tracks.shift();}
    for(const tr of this.tracks)tr.life-=dt;
    this.tracks=this.tracks.filter(t=>t.life>0);
  }
  draw(){
    if(!this.alive&&!this.respawning) return;
    for(const tr of this.tracks){
      ctx.save();ctx.globalAlpha=(tr.life/1.6)*0.22;
      ctx.translate(tr.x,tr.y);ctx.rotate(tr.angle);
      ctx.fillStyle='#223';ctx.fillRect(-17,-13,5,26);ctx.fillRect(12,-13,5,26);
      ctx.restore();
    }
    const alpha=this.respawning?(0.38+0.28*Math.sin(Date.now()*0.014)):1;
    ctx.save();ctx.globalAlpha=alpha;
    ctx.translate(this.x,this.y);ctx.rotate(this.angle);
    if(this.hitFlash>0){ctx.shadowColor='#fff';ctx.shadowBlur=32;}
    if(this.shield){ctx.shadowColor='#00ffff';ctx.shadowBlur=22;ctx.strokeStyle='rgba(0,255,255,0.55)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,29,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;}
    const bCol=this.frozen?'#aaddff':this.hitFlash>0?'#ffffff':this.col;
    ctx.fillStyle=bCol;ctx.shadowColor=bCol;ctx.shadowBlur=10;
    rr(ctx,-20,-16,40,32,5);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.38)';ctx.fillRect(-20,-16,6,32);ctx.fillRect(14,-16,6,32);
    ctx.fillStyle='rgba(255,255,255,0.09)';
    for(let i=0;i<5;i++){ctx.fillRect(-20,-14+i*7,6,3);ctx.fillRect(14,-14+i*7,6,3);}
    ctx.fillStyle=this.acc;ctx.shadowColor=this.acc;ctx.shadowBlur=7;
    ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.fill();ctx.fillRect(9,-4,22,8);
    if(this.bonus==='triple'){ctx.fillStyle='#ffd700';ctx.fillRect(9,-10,16,4);ctx.fillRect(9,6,16,4);}
    if(this.bonus==='laser'){ctx.shadowColor='#ff00ff';ctx.shadowBlur=22;const g=ctx.createLinearGradient(30,0,52,0);g.addColorStop(0,'#ff00ff');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(30,-3,22,6);}
    if(this.bonus==='speed'){ctx.fillStyle='rgba(0,255,136,0.4)';ctx.fillRect(-30,-7,8,14);}
    if(this.bonus==='magnet'){ctx.shadowColor='#cc44ff';ctx.shadowBlur=22;ctx.strokeStyle='#cc44ff';ctx.lineWidth=2;for(let a=0;a<Math.PI*2;a+=Math.PI/3){const r2=22+3*Math.sin(Date.now()*0.005+a);ctx.beginPath();ctx.arc(Math.cos(a)*r2,Math.sin(a)*r2,3,0,Math.PI*2);ctx.stroke();}}
    ctx.restore();
    if(this.frozen){ctx.save();ctx.globalAlpha=0.28;ctx.fillStyle='#88ddff';ctx.translate(this.x,this.y);ctx.rotate(this.angle);rr(ctx,-22,-18,44,36,5);ctx.fill();ctx.restore();}
  }
}

// ═════════════════════ BULLETS & MINES ═════════════════════
function spawnBullet(tank,angle){
  const b={
    x:tank.x+Math.cos(angle)*35,y:tank.y+Math.sin(angle)*35,
    vx:Math.cos(angle)*BULLET_SPEED,vy:Math.sin(angle)*BULLET_SPEED,
    owner:tank,alive:true,trail:[],age:0
  };
  bullets.push(b);
  if(onlineMode&&isHost) db.ref(`game/bullets`).push(b);
}
function fireLaser(tank){
  snd_shoot(true);flash('#ff00ff',160);shake(1.1);
  const a=tank.angle,dx=Math.cos(a),dy=Math.sin(a);
  let x=tank.x+dx*36,y=tank.y+dy*36,dist=0;
  const maxD=Math.max(mapW,mapH)*TILE;
  ctx.save();ctx.strokeStyle='#ff00ff';ctx.lineWidth=9;ctx.shadowColor='#ff00ff';ctx.shadowBlur=35;ctx.globalAlpha=0.88;
  ctx.beginPath();ctx.moveTo(x,y);
  while(dist<maxD){
    x+=dx*TILE*0.28;y+=dy*TILE*0.28;dist+=TILE*0.28;
    const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);
    if(tx<0||ty<0||tx>=mapW||ty>=mapH)break;
    const cell=mapData[ty]&&mapData[ty][tx];
    if(cell&&cell.type==='steel')break;
    if(cell&&cell.type==='brick'){cell.hp-=3;if(cell.hp<=0)cell.type='empty';spawnP(tx*TILE+TILE/2,ty*TILE+TILE/2,'#cc8844',8,85,0.4);break;}
    for(const t of tanks){
      if(t===tank||!t.alive||t.respawning)continue;
      const tdx=t.x-x,tdy=t.y-y;
      if(Math.sqrt(tdx*tdx+tdy*tdy)<TILE){t.hit(2,tank);if(onlineMode)db.ref(`game/hits`).push({target:t.idx,from:tank.idx,dmg:2});}
    }
  }
  ctx.lineTo(x,y);ctx.stroke();ctx.restore();
  spawnP(x,y,'#ff00ff',22,180,0.9);spawnTxt(tank.x,tank.y-42,'⚡ЛАЗЕР!','#ff00ff',18);
}
function layMine(tank){
  const m={x:tank.x,y:tank.y,owner:tank.idx,armed:false,armT:1.5,alive:true,age:0,blink:0};
  mines.push(m);
  spawnTxt(tank.x,tank.y-30,'💣 МИНА!','#ff4444',14);
  if(onlineMode) db.ref(`game/mines`).push(m);
}
function updateMines(dt){
  for(const m of mines){
    if(!m.alive)continue;m.age+=dt;m.blink+=dt;
    if(!m.armed){m.armT-=dt;if(m.armT<=0)m.armed=true;}
    if(m.armed){
      for(const t of tanks){
        if(t.idx===m.owner||!t.alive||t.respawning)continue;
        const dx=t.x-m.x,dy=t.y-m.y;
        if(Math.sqrt(dx*dx+dy*dy)<26){
          m.alive=false;spawnP(m.x,m.y,'#ff4444',44,210,1.3,42);spawnP(m.x,m.y,'#ffaa00',22,160,0.85);
          t.hit(2,tanks.find(tk=>tk.idx===m.owner));shake(1.3);snd_explode(false);
          if(onlineMode)db.ref(`game/hits`).push({target:t.idx,from:m.owner,dmg:2});
          for(let dy2=-1;dy2<=1;dy2++) for(let dx2=-1;dx2<=1;dx2++){
            const tx2=Math.floor(m.x/TILE)+dx2,ty2=Math.floor(m.y/TILE)+dy2;
            if(tx2>=0&&ty2>=0&&tx2<mapW&&ty2<mapH&&mapData[ty2]&&mapData[ty2][tx2]&&mapData[ty2][tx2].type==='brick'){
              mapData[ty2][tx2].hp-=2;if(mapData[ty2][tx2].hp<=0)mapData[ty2][tx2].type='empty';
            }
          }
          break;
        }
      }
    }
    if(m.age>16)m.alive=false;
  }
  mines=mines.filter(m=>m.alive);
}
function drawMines(){
  for(const m of mines){
    if(!m.alive)continue;
    const pulse=m.armed?(0.65+0.35*Math.sin(m.blink*(m.armed?8:3))):0.5;
    ctx.save();ctx.globalAlpha=pulse;ctx.shadowColor=m.armed?'#ff4444':'#888';ctx.shadowBlur=m.armed?16:4;
    ctx.fillStyle=m.armed?'#ff3333':'#555';ctx.beginPath();ctx.arc(m.x,m.y,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 11px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(m.armed?'⬤':'○',m.x,m.y);ctx.restore();
  }
}

function spawnBonus(){

  while(mapData[by]&&mapData[by][bx]&&mapData[by][bx].type!=='empty'&&tries<80);

// ═════════════════════ JOYSTICK ═════════════════════
class Joystick{
  constructor(bx,by,r,type,pidx){this.bx=bx;this.by=by;this.r=r;this.type=type;this.pidx=pidx;this.active=false;this.tid=null;this.sx=0;this.sy=0;this.dx=0;this.dy=0;}
  start(id,x,y){this.active=true;this.tid=id;this.move(x,y);}
  move(x,y){const dx=x-this.bx,dy=y-this.by,d=Math.sqrt(dx*dx+dy*dy),mx=this.r*0.68;if(d>mx){this.sx=(dx/d)*mx;this.sy=(dy/d)*mx}else{this.sx=dx;this.sy=dy}this.dx=dx/this.r;this.dy=dy/this.r;const l=Math.sqrt(this.dx*this.dx+this.dy*this.dy);if(l>1){this.dx/=l;this.dy/=l}}
  end(){this.active=false;this.tid=null;this.sx=0;this.sy=0;this.dx=0;this.dy=0;}
  draw(){
    const col=this.pidx===0?'#00e5ff':'#ff6b35';ctx.save();
    ctx.beginPath();ctx.arc(this.bx,this.by,this.r,0,Math.PI*2);ctx.strokeStyle=col+'55';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=col+'0d';ctx.fill();
    ctx.strokeStyle=col+'1a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(this.bx-this.r,this.by);ctx.lineTo(this.bx+this.r,this.by);ctx.moveTo(this.bx,this.by-this.r);ctx.lineTo(this.bx,this.by+this.r);ctx.stroke();
    const sx=this.bx+this.sx,sy=this.by+this.sy;ctx.beginPath();ctx.arc(sx,sy,this.r*0.31,0,Math.PI*2);
    const g=ctx.createRadialGradient(sx,sy,2,sx,sy,this.r*0.31);g.addColorStop(0,col+(this.active?'ff':'88'));g.addColorStop(1,col+(this.active?'99':'33'));
    ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=col+(this.active?'cc':'44');ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=col+(this.active?'ff':'77');ctx.font=`bold ${Math.round(this.r*0.3)}px Courier New`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.type==='shoot'?'🔥':'✛',sx,sy);ctx.restore();
  }
}

// ═════════════════════ ONLINE FUNCTIONS ═════════════════════
function initOnline(){
  db.ref('players').once('value',snap=>{
    const players=snap.val()||{};
    if(Object.keys(players).length===0) isHost=true;
    myPlayerId=db.ref('players').push({x:2.5*TILE,y:2.5*TILE,angle:0,color:'#00e5ff'}).key;
    db.ref(`players/${myPlayerId}`).onDisconnect().remove();
    if(isHost){
      gameSeed=Date.now();
      mapW=Math.max(Math.floor(canvas.width/TILE),10);
      mapH=Math.max(Math.floor(canvas.height/TILE),6);
      if(mapW<mapH)[mapW,mapH]=[mapH,mapW];
      mapData=genMapFromSeed(mapW,mapH,gameSeed);
      db.ref('game').set({
        seed:gameSeed,mapW,mapH,weather:'none',weatherTimer:0,bonusTimer:BONUS_INT,
        hostId:myPlayerId,started:true
      });
      db.ref('game/bonuses').remove();
      db.ref('game/mines').remove();
      db.ref('game/bullets').remove();
      db.ref('game/hits').remove();
    }
  });
  db.ref('game').on('value',snap=>{
    const g=snap.val();
    if(!g||!isHost){
      if(g&&!isHost){
        if(g.seed!==gameSeed){
          gameSeed=g.seed;mapW=g.mapW;mapH=g.mapH;
          mapData=genMapFromSeed(mapW,mapH,gameSeed);
        }
        weatherType=g.weather||'none';weatherTimer=g.weatherTimer||0;
        bonusTimer=g.bonusTimer||BONUS_INT;
      }
    }
    if(g) hostId=g.hostId;
  });
  db.ref('game/bonuses').on('value',snap=>{
    if(isHost)return;
    const data=snap.val()||{};
    bonusItems=Object.values(data).filter(b=>b.alive).map(b=>({...b,age:b.age||0,bob:Math.random()*Math.PI*2}));
  });
  db.ref('game/mines').on('value',snap=>{
    if(isHost)return;
    const data=snap.val()||{};
    mines=Object.values(data).filter(m=>m.alive).map(m=>({...m,blink:0}));
  });
  db.ref('game/hits').on('child_added',snap=>{
    const h=snap.val();
    if(h&&tanks.length>0){
      const target=tanks.find(t=>t.idx===h.target);
      if(target)target.hit(h.dmg,tanks.find(t=>t.idx===h.from));
      setTimeout(()=>snap.ref.remove(),100);
    }
  });
  db.ref('players').on('value',snap=>{
    onlinePlayers=snap.val()||{};
    if(myPlayerId&&onlinePlayers[myPlayerId]) delete onlinePlayers[myPlayerId];
  });
  if(isHost){
    setInterval(()=>{
      db.ref('game').update({weather:weatherType,weatherTimer,bonusTimer});
    },2000);
  }
}
function sendPosition(x,y,angle){
  if(!onlineMode||!myPlayerId)return;
  db.ref(`players/${myPlayerId}`).update({x:Math.round(x*100)/100,y:Math.round(y*100)/100,angle:Math.round(angle*100)/100});
}
function drawOnlinePlayers(){
  if(!onlineMode)return;
  for(const[id,data]of Object.entries(onlinePlayers)){

    ctx.save();ctx.translate(data.x,data.y);ctx.rotate(data.angle||0);
    ctx.fillStyle=data.color||'#ff6b35';ctx.shadowColor=data.color||'#ff6b35';ctx.shadowBlur=10;
    rr(ctx,-20,-16,40,32,5);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.38)';ctx.fillRect(-20,-16,6,32);ctx.fillRect(14,-16,6,32);
    ctx.fillStyle='#cc3300';ctx.shadowColor='#cc3300';ctx.shadowBlur=7;
    ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.fill();ctx.fillRect(9,-4,22,8);

}
function endOnlineSession(){

// ═════════════════════ WEATHER ═════════════════════
function tryRandomEvent(){

  const ev=['fog','earthquake','bonus_rain','none'][Math.floor(Math.random()*4)];

  else if(ev==='bonus_rain'){spawnTxt(canvas.width/2,canvas.height/2,'🎁 ДОЖДЬ БОНУСОВ!','#ffd700',22);for(let i=0;i<5;i++)setTimeout(()=>spawnBonus(),i*400);}

function updateWeather(dt){
  if(weatherType==='fog'){weatherTimer-=dt;if(weatherTimer<=0)weatherType='none';if(Math.random()<0.25)weatherParts.push({x:Math.random()*canvas.width,y:0,vy:100+Math.random()*60,vx:-15+Math.random()*30,life:canvas.height/130});}
  for(const w of weatherParts){w.y+=w.vy*dt;w.x+=w.vx*dt;w.life-=dt;}

function drawWeather(){
  if(weatherType==='fog'){ctx.save();ctx.fillStyle='rgba(160,185,210,0.16)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(170,200,230,0.22)';ctx.lineWidth=1;for(const w of weatherParts){ctx.globalAlpha=Math.min(w.life/w.maxLife||0,1)*0.3;ctx.beginPath();ctx.moveTo(w.x,w.y-7);ctx.lineTo(w.x,w.y);ctx.stroke();}ctx.restore();}
}

// ═════════════════════ INPUT ═════════════════════
function setupInput(){
  canvas.ontouchstart=(e)=>{e.preventDefault();for(const t of e.changedTouches){const x=t.clientX,y=t.clientY;let hit=false;for(const jj of Object.values(joysticks)){if(jj.active)continue;if(Math.hypot(x-jj.bx,y-jj.by)<jj.r*1.7){jj.start(t.identifier,x,y);hit=true;break;}}if(!hit&&tanks[0]?.alive)tanks[0].shoot();}};
  canvas.ontouchmove=(e)=>{e.preventDefault();for(const t of e.changedTouches)for(const jj of Object.values(joysticks))if(jj.tid===t.identifier)jj.move(t.clientX,t.clientY);};
  canvas.ontouchend=canvas.ontouchcancel=(e)=>{e.preventDefault();for(const t of e.changedTouches)for(const jj of Object.values(joysticks)){if(jj.tid!==t.identifier)continue;if(jj.type==='shoot'&&jj.active&&tanks[jj.pidx]?.alive)tanks[jj.pidx].shoot();jj.end();}};
  const keys={};window.onkeydown=e=>keys[e.key]=true;window.onkeyup=e=>keys[e.key]=false;window._keys=keys;
}

// ═════════════════════ GAME LOOP ═════════════════════
function gameLoop(ts){
  if(gameState!=='playing')return;
  animFrame=requestAnimationFrame(gameLoop);
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  update(dt);render();
}
function update(dt){
  gameTime+=dt;updateTimer();
  const keys=window._keys||{};
  if(tanks[0]?.alive&&!tanks[0].respawning&&!tanks[0].frozen){
    let kx=0,ky=0;
    if(keys['a']||keys['ArrowLeft'])kx=-1;if(keys['d']||keys['ArrowRight'])kx=1;
    if(keys['w']||keys['ArrowUp'])ky=-1;if(keys['s']||keys['ArrowDown'])ky=1;
    if(kx||ky){tanks[0].angle=Math.atan2(ky,kx);tanks[0].tryMove(Math.cos(tanks[0].angle)*tanks[0].spd*dt,Math.sin(tanks[0].angle)*tanks[0].spd*dt);}
    if(keys[' ']||keys['Enter'])tanks[0].shoot();
  }
  if(!onlineMode&&currentMode===2&&tanks[1]?.alive&&!tanks[1].respawning&&!tanks[1].frozen){
    let kx=0,ky=0;
    if(keys['j'])kx=-1;if(keys['l'])kx=1;if(keys['i'])ky=-1;if(keys['k'])ky=1;
    if(kx||ky){tanks[1].angle=Math.atan2(ky,kx);tanks[1].tryMove(Math.cos(tanks[1].angle)*tanks[1].spd*dt,Math.sin(tanks[1].angle)*tanks[1].spd*dt);}
    if(keys['u']||keys['o'])tanks[1].shoot();
  }
  applyJoy(0,dt);if(!onlineMode&&currentMode===2)applyJoy(1,dt);
  for(const t of tanks)t.update(dt);
  if(onlineMode&&tanks[0]?.alive)sendPosition(tanks[0].x,tanks[0].y,tanks[0].angle);
  for(const b of bullets){
    if(!b.alive)continue;
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>8)b.trail.shift();
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.age+=dt;
    if(b.age>4.5){b.alive=false;continue;}
    const tx=Math.floor(b.x/TILE),ty=Math.floor(b.y/TILE);
    if(tx<0||ty<0||tx>=mapW||ty>=mapH){b.alive=false;continue;}
    const cell=mapData[ty]&&mapData[ty][tx];
    if(cell&&cell.type==='steel'){spawnP(b.x,b.y,'#99aabb',6,60,0.22);b.alive=false;}
    else if(cell&&cell.type==='brick'){cell.hp--;if(cell.hp<=0)cell.type='empty';spawnP(b.x,b.y,'#cc8844',7,70,0.32);b.alive=false;}
    if(!b.alive)continue;
    for(const t of tanks){
      if(t===b.owner||!t.alive||t.respawning)continue;
      if(Math.hypot(b.x-t.x,b.y-t.y)<22){
        const res=t.hit(1,b.owner);
        if(res==='bounced'){b.vx=-b.vx;b.vy=-b.vy;b.owner=t;}
        else{if(onlineMode&&isHost)db.ref(`game/hits`).push({target:t.idx,from:b.owner.idx,dmg:1});b.alive=false;}
        break;
      }
    }
  }
  bullets=bullets.filter(b=>b.alive);
  for(const bo of bonusItems){
    if(!bo.alive)continue;bo.age+=dt;bo.bob+=dt;
    for(const t of tanks){
      if(!t.alive||t.respawning)continue;
      if(Math.hypot(bo.x-t.x,bo.y-t.y)<TILE*0.88){t.applyBonus(bo.type);bo.alive=false;if(onlineMode&&isHost)db.ref(`game/bonuses`).once('value',snap=>{const data=snap.val()||{};for(const[k,v]of Object.entries(data)){if(v.x===bo.x&&v.y===bo.y)db.ref(`game/bonuses/${k}`).remove();}});break;}
    }
    if(bo.age>14)bo.alive=false;
  }
  bonusItems=bonusItems.filter(b=>b.alive);
  bonusTimer-=dt*1000;
  if(bonusTimer<=0&&(!onlineMode||isHost)){spawnBonus();bonusTimer=BONUS_INT;if(onlineMode&&isHost)db.ref('game').update({bonusTimer:BONUS_INT});}
  updateMines(dt);
  if(!onlineMode||isHost)tryRandomEvent();
  updateWeather(dt);
  if(shakeTimer>0){shakeTimer-=dt;const s=shakeTimer*8;canvas.style.transform=`translate(${(Math.random()-.5)*s}px,${(Math.random()-.5)*s}px)`;if(shakeTimer<=0)canvas.style.transform='';}
  if(quakeTimer>0){quakeTimer-=dt;if(Math.random()<0.12)shake(0.4);}
  for(const ft of floatingTexts){ft.y+=ft.vy*dt;ft.life-=dt;}
  floatingTexts=floatingTexts.filter(f=>f.life>0);
  for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.93;p.vy*=0.93;p.vy+=p.grav*dt;p.life-=dt;}
  particles=particles.filter(p=>p.life>0);
}
function applyJoy(pidx,dt){
  const t=tanks[pidx];if(!t||!t.alive||t.respawning||t.isBot||t.frozen)return;
  const mj=joysticks['p'+(pidx+1)+'Move'],sj=joysticks['p'+(pidx+1)+'Shoot'];
  if(mj?.active&&(Math.abs(mj.dx)>0.07||Math.abs(mj.dy)>0.07)){t.angle=Math.atan2(mj.dy,mj.dx);t.tryMove(Math.cos(t.angle)*t.spd*Math.hypot(mj.dx,mj.dy)*dt,Math.sin(t.angle)*t.spd*Math.hypot(mj.dx,mj.dy)*dt);}
  if(sj?.active)t.shoot();
}
function render(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#060810';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.05)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  ctx.strokeStyle='#0b1420';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=TILE){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=TILE){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let y=0;y<mapH;y++) for(let x=0;x<mapW;x++){
    const cell=mapData[y]&&mapData[y][x];if(!cell||cell.type==='empty')continue;
    const px=x*TILE,py=y*TILE;
    if(cell.type==='steel'){const g=ctx.createLinearGradient(px,py,px+TILE,py+TILE);g.addColorStop(0,'#1c2d42');g.addColorStop(1,'#111e2e');ctx.fillStyle=g;ctx.fillRect(px,py,TILE,TILE);ctx.strokeStyle='#283e58';ctx.strokeRect(px+1,py+1,TILE-2,TILE-2);ctx.fillStyle='#293f59';ctx.fillRect(px+2,py+2,4,4);ctx.fillRect(px+TILE-6,py+2,4,4);ctx.fillRect(px+2,py+TILE-6,4,4);ctx.fillRect(px+TILE-6,py+TILE-6,4,4);}
    else if(cell.type==='brick'){ctx.fillStyle='#6b2a0e';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(px,py+TILE/2-1,TILE,2);ctx.fillRect(px+TILE/2-1,py,2,TILE);}
  }
  for(const b of bonusItems){
    if(!b.alive)continue;
    const bob=Math.sin(b.bob*3)*4,pulse=Math.sin(b.bob*5)*0.18+0.82;
    ctx.save();ctx.globalAlpha=pulse;ctx.translate(b.x,b.y+bob);ctx.rotate(b.bob*1.4);
    ctx.shadowColor=B_COL[b.type];ctx.shadowBlur=28;
    const g=ctx.createRadialGradient(0,0,3,0,0,17);g.addColorStop(0,B_COL[b.type]);g.addColorStop(1,B_COL[b.type]+'44');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,17,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='bold 13px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(B_SYM[b.type],0,0);ctx.restore();
  }
  drawMines();
  for(const b of bullets){
    for(let i=0;i<b.trail.length;i++){ctx.globalAlpha=(i/b.trail.length)*0.45;ctx.fillStyle='#ffee44';ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,3,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;ctx.shadowColor='#ffcc00';ctx.shadowBlur=14;ctx.fillStyle='#ffff99';ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;
  for(const t of tanks)t.draw();
  drawOnlinePlayers();
  for(const p of particles){ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  drawWeather();
  for(const ft of floatingTexts){ctx.save();ctx.globalAlpha=Math.min(1,ft.life/ft.maxLife*2.2);ctx.fillStyle=ft.col;ctx.shadowColor=ft.col;ctx.shadowBlur=14;ctx.font=`bold ${ft.sz}px Courier New`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ft.txt,ft.x,ft.y);ctx.restore();}
  for(const jj of Object.values(joysticks))jj.draw();
  if(onlineMode){ctx.fillStyle='#ffd700';ctx.font='bold 10px Courier New';ctx.textAlign='right';ctx.fillText(`🌐 ОНЛАЙН | ИГРОКОВ: ${Object.keys(onlinePlayers).length+1}`,W-20,60);}
}
function checkGameOver(){
  const alive=tanks.filter(t=>t.lives>0);
  if(alive.length>1)return;
  gameState='over';if(onlineMode)endOnlineSession();
  document.getElementById('game-over-screen').style.display='flex';
  const wt=document.getElementById('winner-text');
  if(alive[0]){wt.textContent=alive[0].idxx===0?'🏆 СИНИЙ ПОБЕДИЛ!':'🏆 КРАСНЫЙ ПОБЕДИЛ!';}
  else wt.textContent='🤝 НИЧЬЯ!';
}
function showMenu(){
  if(onlineMode)endOnlineSession();onlineMode=false;
  gameState='menu';canvas.style.transform='';
  document.getElementById('menu').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('game-over-screen').style.display='none';
  document.getElementById('countdown').style.display='none';
  if(animFrame)cancelAnimationFrame(animFrame);
}
function restartGame(){if(onlineMode)startOnlineGame();else startGame(currentMode);}
window.addEventListener('resize',()=>{if(gameState==='playing'||gameState==='over'){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}});
</script>
