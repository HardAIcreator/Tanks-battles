<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="manifest" href="./manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Танки: Битва Бонусов</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;width:100vw;height:100vh;overflow:hidden;font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none;}
#gc{width:100%;height:100%;position:relative;}
canvas{display:block;touch-action:none;}

/* ── MENU ── */
#menu{position:absolute;inset:0;background:radial-gradient(ellipse at center,#0d1b2a 0%,#020408 80%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:14px;}
#menu .tag{font-size:clamp(9px,2vw,12px);color:#ff6b35;letter-spacing:6px;}
#menu h1{font-size:clamp(22px,6vw,46px);color:#00e5ff;text-shadow:0 0 20px #00e5ff,0 0 60px #0055ff;letter-spacing:4px;text-align:center;line-height:1.2;animation:glow 2.5s ease-in-out infinite;}
@keyframes glow{0%,100%{text-shadow:0 0 20px #00e5ff,0 0 40px #0055ff}50%{text-shadow:0 0 40px #00e5ff,0 0 100px #0055ff,0 0 160px #003388}}
.tankanim{display:flex;gap:24px;margin:2px 0;}
.tankanim span{font-size:clamp(20px,4vw,36px);animation:tbob 1s ease-in-out infinite alternate;}
.tankanim span:nth-child(2){animation-delay:.5s;}
@keyframes tbob{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.mbtn{background:transparent;border:2px solid #00e5ff;color:#00e5ff;font-family:'Courier New',monospace;font-size:clamp(10px,2.3vw,15px);letter-spacing:3px;padding:clamp(8px,2vw,12px) clamp(18px,4vw,40px);cursor:pointer;text-transform:uppercase;transition:all .18s;position:relative;overflow:hidden;min-width:220px;}
.mbtn::before{content:'';position:absolute;inset:0;background:#00e5ff;transform:scaleX(0);transform-origin:left;transition:transform .18s;z-index:-1;}
.mbtn:hover::before,.mbtn:active::before{transform:scaleX(1)}
.mbtn:hover,.mbtn:active{color:#0a0a0f}
.mbtn.r{border-color:#ff6b35;color:#ff6b35}.mbtn.r::before{background:#ff6b35}
.mbtn.g{border-color:#00ff88;color:#00ff88}.mbtn.g::before{background:#00ff88}
.mbtn.p{border-color:#cc44ff;color:#cc44ff}.mbtn.p::before{background:#cc44ff}
.menu-sep{color:#333;font-size:11px;letter-spacing:4px;}

/* ── ONLINE LOBBY ── */
#lobby{position:absolute;inset:0;background:radial-gradient(ellipse at center,#0a1020 0%,#020408 80%);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px;}
#lobby h2{font-size:clamp(16px,4vw,28px);color:#cc44ff;letter-spacing:4px;text-shadow:0 0 20px #cc44ff;}
.lobby-box{background:rgba(255,255,255,0.04);border:1px solid rgba(204,68,255,0.3);padding:16px 24px;min-width:260px;max-width:340px;width:90vw;}
.lobby-input{background:rgba(0,0,0,0.5);border:1px solid #cc44ff44;color:#fff;font-family:'Courier New',monospace;font-size:13px;letter-spacing:2px;padding:8px 12px;width:100%;margin:6px 0;outline:none;}
.lobby-input:focus{border-color:#cc44ff;}
.lobby-row{display:flex;gap:8px;margin:4px 0;}
#lobby-status{font-size:11px;color:#888;letter-spacing:1px;min-height:16px;text-align:center;}
#lobby-players{font-size:11px;color:#cc44ff;letter-spacing:1px;min-height:16px;text-align:center;}
.lobby-label{font-size:10px;color:#666;letter-spacing:2px;margin-bottom:2px;}

/* ── HUD ── */
#hud{position:absolute;top:0;left:0;right:0;height:46px;display:none;align-items:center;justify-content:space-between;padding:0 10px;background:rgba(0,0,0,0.85);border-bottom:1px solid rgba(255,255,255,0.06);z-index:50;pointer-events:none;}
.hp{display:flex;align-items:center;gap:7px;min-width:120px;}
.hp.r{justify-content:flex-end;}
.pname{font-size:10px;color:#555;letter-spacing:2px;}
.lives{display:flex;gap:4px;}
.li{width:14px;height:14px;background:#00e5ff;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);transition:background .3s,transform .15s;}
.li.lost{background:#1a2030;transform:scale(0.65);}
.li.c2{background:#ff6b35;}.li.c3{background:#cc44ff;}.li.c4{background:#00ff88;}
.li.c2.lost,.li.c3.lost,.li.c4.lost{background:#1a2030;}
.bpill{font-size:9px;letter-spacing:1px;border:1px solid;padding:2px 5px;display:none;animation:pin .2s ease;}
@keyframes pin{from{transform:scale(0.4);opacity:0}to{transform:scale(1);opacity:1}}
#htimer{font-size:10px;color:#444;letter-spacing:2px;}
.ping-dot{width:7px;height:7px;border-radius:50%;background:#00ff88;display:inline-block;margin-right:4px;}
.ping-dot.bad{background:#ff4444;}
#ping-disp{font-size:9px;color:#666;letter-spacing:1px;}

/* ── MISC ── */
#flash{position:absolute;inset:0;pointer-events:none;z-index:300;opacity:0;transition:opacity .08s;}
#countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:150;pointer-events:none;}
#countdown span{font-size:clamp(60px,15vw,120px);color:#fff;text-shadow:0 0 40px #00e5ff;animation:cpop .9s ease;}
@keyframes cpop{0%{transform:scale(2.5);opacity:0}35%{transform:scale(1);opacity:1}80%{opacity:1}100%{transform:scale(0.7);opacity:0}}
#game-over-screen{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px;}
#game-over-screen h2{font-size:clamp(20px,5vw,42px);color:#ff4444;text-shadow:0 0 20px #ff4444;letter-spacing:5px;}
#winner-text{font-size:clamp(13px,3vw,22px);color:#ffd700;letter-spacing:3px;}
#stats-text{font-size:clamp(9px,2vw,13px);color:#666;letter-spacing:1px;}
#kill-feed{position:absolute;top:52px;right:10px;display:flex;flex-direction:column;gap:3px;z-index:60;pointer-events:none;max-width:200px;}
.kf-item{font-size:10px;color:#fff;background:rgba(0,0,0,0.6);padding:2px 7px;letter-spacing:1px;animation:kffade 3s ease forwards;}
@keyframes kffade{0%{opacity:1;transform:translateX(20px)}10%{opacity:1;transform:translateX(0)}80%{opacity:1}100%{opacity:0}}

/* ── REMATCH (онлайн) ── */
#rematch-screen{position:absolute;inset:0;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:210;gap:16px;}
#rematch-screen h2{font-size:clamp(18px,5vw,36px);color:#ffd700;text-shadow:0 0 20px #ffd700;letter-spacing:4px;}
#rematch-winner{font-size:clamp(12px,3vw,20px);color:#fff;letter-spacing:2px;}
#rematch-votes{font-size:clamp(10px,2.5vw,16px);color:#cc44ff;letter-spacing:2px;min-height:22px;}
#rematch-status{font-size:clamp(9px,2vw,13px);color:#888;letter-spacing:1px;}
.mbtn.voted{background:#00ff88;border-color:#00ff88;color:#000;pointer-events:none;}

/* ── SETTINGS ── */
#settings{position:absolute;inset:0;background:radial-gradient(ellipse at center,#0a1020 0%,#020408 85%);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:120;gap:14px;padding:20px;}
#settings h2{font-size:clamp(16px,4vw,28px);color:#00e5ff;letter-spacing:5px;text-shadow:0 0 15px #00e5ff;margin-bottom:4px;}
.sbox{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:14px 18px;width:min(320px,88vw);}
.sbox-title{font-size:9px;color:#555;letter-spacing:3px;margin-bottom:10px;text-transform:uppercase;}
.srow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:7px 0;}
.slabel{font-size:11px;color:#aaa;letter-spacing:1px;}

/* Volume slider */
.vol-wrap{display:flex;align-items:center;gap:8px;flex:1;}
.vol-icon{font-size:14px;cursor:pointer;user-select:none;}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;background:#1a2535;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#00e5ff;cursor:pointer;box-shadow:0 0 8px #00e5ff;}

/* Difficulty buttons */
.diff-group{display:flex;gap:6px;flex-wrap:wrap;}
.diff-btn{background:transparent;border:1px solid #333;color:#555;font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;padding:5px 8px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.diff-btn.active-easy  {border-color:#00ff88;color:#00ff88;background:rgba(0,255,136,0.08);}
.diff-btn.active-normal{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,0.08);}
.diff-btn.active-hard  {border-color:#ff6b35;color:#ff6b35;background:rgba(255,107,53,0.08);}
.diff-btn.active-pro   {border-color:#ff00ff;color:#ff00ff;background:rgba(255,0,255,0.12);animation:glow-pro 1.5s ease-in-out infinite;}
@keyframes glow-pro{0%,100%{box-shadow:0 0 4px #ff00ff}50%{box-shadow:0 0 14px #ff00ff,0 0 28px #8800ff}}

/* Mode selector */
.mode-group{display:flex;gap:6px;}
.mode-btn{background:transparent;border:1px solid #333;color:#555;font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;padding:5px 10px;cursor:pointer;transition:all .15s;}
.mode-btn.active{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,0.08);}
</style>
</head>
<body>
<div id="gc">
  <canvas id="gameCanvas"></canvas>
  <div id="flash"></div>

  <!-- MENU -->
  <div id="menu">
    <div class="tag">⚡ ARCADE ТАНКИ ⚡</div>
    <div class="tankanim"><span>🔵</span><span>🔴</span><span>🟣</span><span>🟢</span></div>
    <h1>БИТВА<br>БОНУСОВ</h1>
    <button class="mbtn" id="menu-vs-bot" onclick="startGame(1)">▶ ОДИН ПРОТИВ БОТА</button>
    <button class="mbtn r" onclick="startGame(2)">⚔ РЕЖИМ 2 ИГРОКОВ</button>
    <div class="menu-sep">── ОНЛАЙН ──</div>
    <button class="mbtn p" onclick="showLobby('create')">🌐 СОЗДАТЬ ИГРУ</button>
    <button class="mbtn g" onclick="showLobby('join')">🔗 ВОЙТИ В ИГРУ</button>
    <div class="menu-sep">──────────</div>
    <button class="mbtn" onclick="showSettings()" style="border-color:#888;color:#888;font-size:clamp(9px,2vw,13px);">⚙ НАСТРОЙКИ</button>
  </div>

  <!-- SETTINGS -->
  <div id="settings">
    <h2>⚙ НАСТРОЙКИ</h2>

    <!-- Громкость -->
    <div class="sbox">
      <div class="sbox-title">🔊 Громкость звука</div>
      <div class="srow">
        <span class="vol-icon" onclick="toggleMute()">🔊</span>
        <div class="vol-wrap">
          <input type="range" id="vol-slider" min="0" max="100" value="70" oninput="setVolume(this.value)">
        </div>
        <span class="slabel" id="vol-label">70%</span>
      </div>
    </div>

    <!-- Сложность -->
    <div class="sbox">
      <div class="sbox-title">🤖 Сложность бота</div>
      <div class="srow" style="justify-content:center;">
        <div class="diff-group">
          <button class="diff-btn active-easy" id="diff-easy"   onclick="setDiff('easy')">😴 ЛЁГКИЙ</button>
          <button class="diff-btn"             id="diff-normal" onclick="setDiff('normal')">😐 НОРМАЛЬНЫЙ</button>
          <button class="diff-btn"             id="diff-hard"   onclick="setDiff('hard')">😤 СЛОЖНЫЙ</button>
          <button class="diff-btn"             id="diff-pro"    onclick="setDiff('pro')">💀 ПРОФИ</button>
        </div>
      </div>
      <div id="diff-desc" style="font-size:10px;color:#666;letter-spacing:1px;margin-top:8px;text-align:center;min-height:28px;"></div>
    </div>

    <button class="mbtn" onclick="hideSettings()">↩ НАЗАД</button>
  </div>

  <!-- ONLINE LOBBY -->
  <div id="lobby">
    <h2 id="lobby-title">🌐 ОНЛАЙН</h2>
    <div class="lobby-box">
      <div class="lobby-label" id="lbl-name">ИМЯ ИГРОКА</div>
      <input class="lobby-input" id="inp-name" maxlength="12" placeholder="ТВОЁ ИМЯ" value="ИГРОК"/>
      <div id="join-section" style="display:none">
        <div class="lobby-label" style="margin-top:10px">КОД КОМНАТЫ</div>
        <input class="lobby-input" id="inp-room" maxlength="6" placeholder="XXXXXX" style="text-transform:uppercase;letter-spacing:6px;font-size:18px;text-align:center"/>
      </div>
      <div style="margin-top:12px;" id="lobby-status">Подключение к Firebase...</div>
      <div id="lobby-players"></div>
      <div class="lobby-row" style="margin-top:14px;justify-content:center;">
        <button class="mbtn p" id="btn-lobby-go" onclick="lobbyAction()">СОЗДАТЬ</button>
        <button class="mbtn" onclick="showMenu()" style="min-width:auto;padding:8px 16px;">✕</button>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hp" id="hud-left">
      <div class="pname" id="pname1">P1</div>
      <div class="lives" id="lives-0"></div>
      <div class="bpill" id="bp-0"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="ping-dot" id="pingdot"></span>
      <span id="ping-disp"></span>
      <span id="htimer">00:00</span>
    </div>
    <div class="hp r" id="hud-right">
      <div class="bpill" id="bp-1"></div>
      <div class="lives" id="lives-1"></div>
      <div class="pname" id="pname2">P2</div>
    </div>
  </div>

  <div id="kill-feed"></div>
  <div id="countdown"><span id="cnum"></span></div>

  <!-- Game Over (локальный) -->
  <div id="game-over-screen">
    <h2>ИГРА ОКОНЧЕНА</h2>
    <div id="winner-text"></div>
    <div id="stats-text"></div>
    <button class="mbtn" onclick="showMenu()">↩ МЕНЮ</button>
    <button class="mbtn" onclick="restartGame()">↺ ЗАНОВО</button>
  </div>

  <!-- Rematch screen (онлайн) -->
  <div id="rematch-screen">
    <h2>🏆 РАУНД ОКОНЧЕН</h2>
    <div id="rematch-winner"></div>
    <div id="rematch-votes"></div>
    <div id="rematch-status">Хочешь сыграть ещё?</div>
    <button class="mbtn g" id="btn-rematch" onclick="voteRematch()">🔄 ИГРАТЬ СНОВА</button>
    <button class="mbtn" onclick="showMenu()">↩ В МЕНЮ</button>
  </div>
</div>

<!-- Firebase SDK (compat — без сборщика) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
'use strict';
// ══════════════════════════════════════════════════════════
//  FIREBASE INIT
// ══════════════════════════════════════════════════════════
const fbCfg = {
  apiKey:"AIzaSyC2g0no1AD5iU_HpMsF67TO0Co7nDyrH2A",
  authDomain:"tanks-online-9b1e7.firebaseapp.com",
  databaseURL:"https://tanks-online-9b1e7-default-rtdb.firebaseio.com",
  projectId:"tanks-online-9b1e7",
  storageBucket:"tanks-online-9b1e7.firebasestorage.app",
  messagingSenderId:"319740053124",
  appId:"1:319740053124:web:ffe970f5b2fb94db9e24d1"
};
firebase.initializeApp(fbCfg);
const db = firebase.database();

// ══════════════════════════════════════════════════════════
//  AUDIO — процедурный синтез
// ══════════════════════════════════════════════════════════
let _ac=null;
const AC=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
const vol=()=>isMuted?0:masterVolume;
function snd_shoot(laser){
  try{const ac=AC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);
  if(laser){o.type='sawtooth';o.frequency.setValueAtTime(1400,ac.currentTime);o.frequency.exponentialRampToValueAtTime(150,ac.currentTime+0.35);g.gain.setValueAtTime(0.25*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35);o.start();o.stop(ac.currentTime+0.35);}
  else{o.type='square';o.frequency.setValueAtTime(360,ac.currentTime);o.frequency.exponentialRampToValueAtTime(65,ac.currentTime+0.1);g.gain.setValueAtTime(0.14*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);o.start();o.stop(ac.currentTime+0.1);}}catch(e){}}
function snd_explode(big){
  try{const ac=AC(),len=big?0.9:0.45,buf=ac.createBuffer(1,ac.sampleRate*len,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,big?1.2:1.8);
  const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();
  f.type='lowpass';f.frequency.value=big?550:850;src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime((big?1.0:0.6)*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+len);src.start();}catch(e){}}
function snd_wall(){try{const ac=AC(),o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(180,ac.currentTime);o.frequency.exponentialRampToValueAtTime(55,ac.currentTime+0.07);g.gain.setValueAtTime(0.07*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.07);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.07);}catch(e){}}
function snd_pickup(){try{const ac=AC();[523,659,784,1047].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.12*vol(),ac.currentTime+i*0.07);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.07+0.12);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*0.07);o.stop(ac.currentTime+i*0.07+0.12);});}catch(e){}}
function snd_shield(){try{const ac=AC(),o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(900,ac.currentTime);o.frequency.setValueAtTime(300,ac.currentTime+0.06);g.gain.setValueAtTime(0.16*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.22);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.22);}catch(e){}}
function snd_freeze(){try{const ac=AC();for(let i=0;i<6;i++){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=800+i*200+Math.random()*100;g.gain.setValueAtTime(0.05*vol(),ac.currentTime+i*0.03);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.03+0.14);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*0.03);o.stop(ac.currentTime+i*0.03+0.14);}}catch(e){}}
function snd_countdown(go){try{const ac=AC(),o=ac.createOscillator(),g=ac.createGain();o.type='square';o.frequency.value=go?880:440;g.gain.setValueAtTime(0.16*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.14);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.14);}catch(e){}}
function snd_mine(){try{const ac=AC(),o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,ac.currentTime);o.frequency.setValueAtTime(100,ac.currentTime+0.05);g.gain.setValueAtTime(0.09*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.1);}catch(e){}}
function snd_ricco(){try{const ac=AC(),o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(1200,ac.currentTime);o.frequency.exponentialRampToValueAtTime(300,ac.currentTime+0.2);g.gain.setValueAtTime(0.12*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.2);}catch(e){}}
function snd_quake(){try{const ac=AC(),len=1.5,buf=ac.createBuffer(1,ac.sampleRate*len,ac.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.5;const src=ac.createBufferSource(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=120;src.buffer=buf;src.connect(f);f.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.85*vol(),ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+len);src.start();}catch(e){}}

function calcTile(mW, mH){
  const W=window.innerWidth, H=window.innerHeight;
  // Оставляем 46px под HUD сверху и ~150px под джойстики снизу
  const usableW = W;
  const usableH = H - 46 - 150;
  const byW = Math.floor(usableW / mW);
  const byH = Math.floor(usableH / mH);
  // Берём минимум чтобы карта влезла целиком, но не меньше 36 и не больше 58
  return Math.max(36, Math.min(byW, byH, 58));
}

// ══════════════════════════════════════════════════════════
//  MAP GENERATION  (seeded — одинакова у всех в комнате)
// ══════════════════════════════════════════════════════════
function seededRand(seed){
  let s=seed;
  return ()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};
}
function genMap(w,h,seed=42){
  const rand=seededRand(seed);
  const m=[];
  for(let y=0;y<h;y++){
    m[y]=[];
    for(let x=0;x<w;x++){
      m[y][x]=(x===0||y===0||x===w-1||y===h-1)
        ?{type:'steel',hp:999}
        :{type:'empty',hp:0};
    }
  }

  // Блоки ставим на каждой позиции с вероятностью ~22%
  // Танк теперь маленький (r=13) — пролезает через проход в 1 тайл
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      // Зоны спавна (4 угла, 4×4)
      if(x<=4&&y<=4) continue;
      if(x>=w-5&&y>=h-5) continue;
      if(x<=4&&y>=h-5) continue;
      if(x>=w-5&&y<=4) continue;
      if(rand()<0.22){
        m[y][x]={type:'brick',hp:WALL_HP};
      }
    }
  }

  // Стальные столбы в 5 точках карты
  const stPts=[
    [Math.floor(w*0.25), Math.floor(h*0.33)],
    [Math.floor(w*0.75), Math.floor(h*0.33)],
    [Math.floor(w*0.25), Math.floor(h*0.67)],
    [Math.floor(w*0.75), Math.floor(h*0.67)],
    [Math.floor(w*0.50), Math.floor(h*0.50)],
  ];
  for(const[sx,sy] of stPts){
    if(sx<1||sy<1||sx>=w-1||sy>=h-1) continue;
    if(sx<=4&&sy<=4) continue;
    if(sx>=w-5&&sy>=h-5) continue;
    if(sx<=4&&sy>=h-5) continue;
    if(sx>=w-5&&sy<=4) continue;
    m[sy][sx]={type:'steel',hp:999};
    // Чистим соседей чтобы вокруг столба был проход
    for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nx=sx+dx,ny=sy+dy;
      if(nx>=0&&ny>=0&&nx<w&&ny<h&&m[ny][nx].type==='brick')
        m[ny][nx]={type:'empty',hp:0};
    }
  }

  return m;
}

// ══════════════════════════════════════════════════════════
//  A*
// ══════════════════════════════════════════════════════════
function findPath(sx,sy,ex,ey){
  if(sx===ex&&sy===ey)return null;
  const open=[{x:sx,y:sy,g:0,h:Math.abs(sx-ex)+Math.abs(sy-ey),p:null}];
  const closed=new Set();const K=(x,y)=>x+','+y;let iter=0;
  while(open.length&&iter++<300){
    open.sort((a,b)=>(a.g+a.h)-(b.g+b.h));const c=open.shift();
    if(c.x===ex&&c.y===ey){const path=[];let n=c;while(n){path.unshift({x:n.x,y:n.y});n=n.p;}return path;}
    closed.add(K(c.x,c.y));
    for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=c.x+dx,ny=c.y+dy;
      if(nx<0||ny<0||nx>=mapW||ny>=mapH||closed.has(K(nx,ny)))continue;
      if(mapData[ny][nx].type!=='empty')continue;
      const g=c.g+1,h=Math.abs(nx-ex)+Math.abs(ny-ey);
      const e2=open.find(n=>n.x===nx&&n.y===ny);
      if(!e2)open.push({x:nx,y:ny,g,h,p:c});else if(g<e2.g){e2.g=g;e2.p=c;}
    }
  }
  return null;
}

class Tank{
  constructor(x,y,cidx,bot,pidx,name){
    this.x=x;this.y=y;this.angle=pidx===0?0:pidx===1?Math.PI:pidx===2?Math.PI/2:-Math.PI/2;
    this.cidx=cidx;
    this.col=P_COLORS[cidx%P_COLORS.length][0];
    this.acc=P_COLORS[cidx%P_COLORS.length][1];
    this.name=name||P_COLORS[cidx%P_COLORS.length][2];
    this.bot=bot;this.pidx=pidx;
    this.lives=MAX_LIVES;this.alive=true;
    this.spd=bot?BOT_SPEED:TANK_SPEED;this.baseSpd=this.spd;
    this.scd=0;this.srate=0.48;
    this.bonus=null;this.bTimer=0;
    this.shield=false;this.frozen=false;this.frozenT=0;
    this.magnet=false;this.ghost=false;
    this.ricochet=false;this.rapidFire=false;
    this.hitFlash=0;
    this.spawnX=x;this.spawnY=y;
    this.respawning=false;this.respawnT=0;
    this.path=null;this.pathT=0;this.botTarget=null;
    this.botState='hunt';this.dodgeAng=0;this.dodgeT=0;
    this.kills=0;this.shots=0;
    this.tracks=[];this.trackT=0;
    this.remote=false;
    this.rocketAmmo=0;
    this.mineCount=0;
    this.hackerTimer=0; // инверсия управления
  }
  get tx(){return Math.floor(this.x/TILE);}
  get ty(){return Math.floor(this.y/TILE);}

  applyBonus(type){
    this.bonus=type;this.bTimer=BONUS_DUR;
    this.shield=(type==='armor');
    this.magnet=(type==='magnet');
    this.ghost=(type==='ghost');
    this.ricochet=(type==='ricochet');
    this.rapidFire=(type==='rapid');
    if(type==='speed')this.spd=this.baseSpd*1.85;
    else if(type==='armor')this.spd=this.baseSpd*0.55;
    else this.spd=this.baseSpd;
    this.srate=this.rapidFire?0.15:0.48;
    // Ракета: 3 патрона, сразу расходуется как ammo
    if(type==='rocket'){
      this.rocketAmmo=3;
      this.bTimer=99999; // живёт пока есть патроны
    }
    updateBonusHUD(this.pidx,type);
    snd_pickup();
    spawnTxt(this.x,this.y-32,'+'+B_NAME[type],B_COL[type],15);
    spawnP(this.x,this.y,B_COL[type],28,140,0.7);
    if(type==='freeze'){
      for(const ot of tanks){
        if(ot===this)continue;
        ot.frozen=true;ot.frozenT=3.5;
        spawnP(ot.x,ot.y,'#88ddff',22,100,0.9);
        spawnTxt(ot.x,ot.y-32,'❄ ЗАМОРОЖЕН!','#88ddff',15);snd_freeze();
      }
    }
    // Синхронизируем бонус через Firebase
    if(onlineMode&&roomRef&&!this.remote)roomRef.child('playerBonuses/'+this.pidx).set(type);
    if(type==='nuke'){this._doNuke();}
    if(type==='teleport'){this._doTeleport();}
    if(type==='heal'){this._doHeal();}
    if(type==='hacker'){this._doHacker();}
  }
  _doHeal(){
    // Лечение: +1 жизнь, но не больше максимума
    if(this.lives<MAX_LIVES){
      this.lives=Math.min(MAX_LIVES,this.lives+1);
      updateLivesHUD();
      if(onlineMode&&isHost&&roomRef)fbSyncTankLives(this.pidx,this.lives);
    }
    spawnP(this.x,this.y,'#ff4488',25,120,0.8);
    spawnTxt(this.x,this.y-36,'❤ +1 ЖИЗНЬ','#ff4488',16);
    this.bonus=null;this.bTimer=0;updateBonusHUD(this.pidx,null);
    if(onlineMode&&roomRef&&!this.remote)roomRef.child('playerBonuses/'+this.pidx).remove();
  }
  _doHacker(){
    spawnTxt(this.x,this.y-40,'💀 ХАКЕР!','#44ff44',18);
    flash('#44ff44',200);
    for(const ot of tanks){
      if(ot===this) continue;
      ot.hackerTimer=5; // 5 секунд инверсии
      spawnTxt(ot.x,ot.y-30,'💀 ИНВЕРСИЯ!','#44ff44',14);
      spawnP(ot.x,ot.y,'#44ff44',15,100,0.7);
    }
    this.bonus=null;this.bTimer=0;updateBonusHUD(this.pidx,null);
    if(onlineMode&&roomRef&&!this.remote)roomRef.child('playerBonuses/'+this.pidx).remove();
  }
  _doNuke(){
    flash('#ffff00',400);shake(3);snd_explode(true);
    spawnTxt(this.x,this.y-50,'☢ НЮКЕР!','#ff3300',24);
    // Урон всем в радиусе 4 тайлов
    for(const ot of tanks){
      if(ot===this)continue;
      const dx=ot.x-this.x,dy=ot.y-this.y;
      if(Math.sqrt(dx*dx+dy*dy)<TILE*5){
        ot.hit(1,this);
        spawnP(ot.x,ot.y,'#ff3300',20,150,0.8);
      }
    }
    // Снос стен вокруг
    for(let dy2=-3;dy2<=3;dy2++) for(let dx2=-3;dx2<=3;dx2++){
      const tx2=this.tx+dx2,ty2=this.ty+dy2;
      if(tx2>=0&&ty2>=0&&tx2<mapW&&ty2<mapH&&mapData[ty2][tx2].type==='brick')
        mapData[ty2][tx2].type='empty';
    }
    this.bonus=null;this.bTimer=0;updateBonusHUD(this.pidx,null);
    if(onlineMode&&isHost&&roomRef) fbSyncMap();
  }
  _doTeleport(){
    let tx2,ty2,tries=0;
    do{tx2=1+Math.floor(Math.random()*(mapW-2));ty2=1+Math.floor(Math.random()*(mapH-2));tries++;}
    while(mapData[ty2][tx2].type!=='empty'&&tries<60);
    if(tries<60){
      spawnP(this.x,this.y,'#44ffff',20,120,0.7);
      this.x=tx2*TILE+TILE/2;this.y=ty2*TILE+TILE/2;
      spawnP(this.x,this.y,'#44ffff',20,120,0.7);
      snd_teleport();spawnTxt(this.x,this.y-30,'ТЕЛЕПОРТ!','#44ffff',16);
    }
    this.bonus=null;this.bTimer=0;updateBonusHUD(this.pidx,null);
  }
  clearBonus(){
    this.bonus=null;this.shield=false;this.magnet=false;
    this.ghost=false;this.ricochet=false;this.rapidFire=false;
    this.rocketAmmo=0;
    this.spd=this.baseSpd;this.srate=0.48;
    updateBonusHUD(this.pidx,null);
    if(onlineMode&&roomRef&&!this.remote)roomRef.child('playerBonuses/'+this.pidx).remove();
  }

  shoot(){
    if(this.scd>0||!this.alive||this.respawning||this.frozen)return;
    this.scd=this.srate;this.shots++;
    if(this.bonus==='triple'){[-0.3,0,0.3].forEach(a=>spawnBullet(this,this.angle+a));snd_shoot(false);}
    else if(this.bonus==='laser'){fireLaser(this);}
    else if(this.bonus==='mine'){
      // Максимум 5 мин на поле от одного игрока
      const myMines=mines.filter(mn=>mn.owner===this&&mn.alive).length;
      if(myMines>=5){spawnTxt(this.x,this.y-30,'МАХ 5 МИН!','#ff4444',12);return;}
      layMine(this);snd_mine();
    }
    else if(this.bonus==='rocket'){
      if(this.rocketAmmo>0){
        spawnRocket(this);
        this.rocketAmmo--;
        spawnTxt(this.x,this.y-30,'🚀 '+this.rocketAmmo,'#ff8800',14);
        if(this.rocketAmmo<=0) this.clearBonus();
      }
    }
    else{spawnBullet(this,this.angle);snd_shoot(false);}
    // В онлайне — транслируем выстрел в Firebase
    if(onlineMode&&roomRef&&!this.remote){fbShotEvent(this);}
  }

  update(dt){
    if(this.remote)return; // remote tanks обновляются через Firebase
    if(this.respawning){this.respawnT-=dt;if(this.respawnT<=0){this.respawning=false;this.alive=true;}return;}
    if(!this.alive)return;
    if(this.scd>0)this.scd-=dt;
    if(this.hitFlash>0)this.hitFlash-=dt;
    if(this.frozen){this.frozenT-=dt;if(this.frozenT<=0){this.frozen=false;spawnTxt(this.x,this.y-30,'РАЗМОРАЖИВАЕТСЯ','#88ddff',12);}return;}
    if(this.bTimer>0){this.bTimer-=dt*1000;if(this.bTimer<=0)this.clearBonus();}
    if(this.hackerTimer>0){
      this.hackerTimer-=dt;
      if(this.hackerTimer<=0){
        this.hackerTimer=0;
        spawnTxt(this.x,this.y-28,'УПРАВЛЕНИЕ OK','#44ff44',12);
      }
    }
    if(this.magnet){
      for(const b of bonusItems){if(!b.alive)continue;const dx=this.x-b.x,dy=this.y-b.y,d=Math.sqrt(dx*dx+dy*dy);if(d<TILE*6&&d>2){b.x+=dx/d*TILE*2.8*dt;b.y+=dy/d*TILE*2.8*dt;}}
    }
    this.trackT-=dt;
    if(this.trackT<=0){this.trackT=0.12;this.tracks.push({x:this.x,y:this.y,angle:this.angle,life:1.6});if(this.tracks.length>28)this.tracks.shift();}
    for(const tr of this.tracks)tr.life-=dt;
    this.tracks=this.tracks.filter(t=>t.life>0);
    if(this.bot)this.updateBot(dt);
  }

  updateBot(dt){
    const p=DIFF_PARAMS[botDifficulty]||DIFF_PARAMS.easy;
    const player=tanks.find(t=>!t.bot&&t.alive);
    if(!player) return;

    // ── ОБЩАЯ ЛОГИКА (все уровни) ──
    // Угроза: летящие пули
    let threatened=false;
    for(const b of bullets){
      if(b.owner===this||!b.alive) continue;
      const dx=this.x-b.x, dy=this.y-b.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<TILE*p.threatRange){
        const bdir=Math.atan2(b.vy,b.vx), tot=Math.atan2(dy,dx);
        if(Math.abs(angDiff(bdir,tot))<0.45){threatened=true; break;}
      }
    }
    for(const m of mines){
      if(m.owner===this) continue;
      const dx=this.x-m.x, dy=this.y-m.y;
      if(Math.sqrt(dx*dx+dy*dy)<TILE*2.2){threatened=true; break;}
    }

    // Ближайший бонус в радиусе
    let nearBonus=null;
    let nearBonusDist=Infinity;
    for(const b of bonusItems){
      if(!b.alive) continue;
      const dx=b.x-this.x, dy=b.y-this.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<TILE*p.bonusRange && d<nearBonusDist){nearBonus=b; nearBonusDist=d;}
    }

    // Состояние
    if(threatened && this.dodgeT<=0 && Math.random()<p.dodgeChance){
      this.botState='dodge';
      // ПРОФИ: уходит не просто в сторону, а к укрытию
      if(botDifficulty==='pro'){
        const ang=this.angle+Math.PI*0.5*(Math.random()>0.5?1:-1);
        this.dodgeAng=ang;
      } else {
        this.dodgeAng=this.angle+Math.PI*0.5*(Math.random()>0.5?1:-1);
      }
      this.dodgeT=0.55;
    } else if(nearBonus && !this.bonus){
      this.botState='grab_bonus'; this.botTarget=nearBonus;
    } else if(this.botState!=='dodge'){
      this.botState='hunt';
    }
    if(this.dodgeT>0){this.dodgeT-=dt; if(this.dodgeT<=0)this.botState='hunt';}

    // ── ПРОФИ: особое поведение ──
    if(botDifficulty==='pro'){
      this._updateBotPro(dt, player, p, nearBonus);
      return;
    }

    // ── ОБЫЧНЫЙ БОТ (easy/normal/hard) ──
    let targetX=player.x, targetY=player.y;
    if(this.botState==='grab_bonus'&&this.botTarget){
      if(!bonusItems.includes(this.botTarget)){this.botState='hunt'; this.botTarget=null;}
      else{targetX=this.botTarget.x; targetY=this.botTarget.y;}
    }
    this.pathT-=dt;
    if(this.pathT<=0){
      this.pathT=p.pathTime;
      this.path=findPath(this.tx,this.ty,Math.floor(targetX/TILE),Math.floor(targetY/TILE));
    }
    let moveAng=Math.atan2(targetY-this.y, targetX-this.x);
    if(this.path&&this.path.length>1){
      const nxt=this.path[1];
      const nx=nxt.x*TILE+TILE/2, ny=nxt.y*TILE+TILE/2;
      const dx=nx-this.x, dy=ny-this.y;
      if(Math.sqrt(dx*dx+dy*dy)<TILE*0.5) this.path.shift();
      moveAng=Math.atan2(dy,dx);
    }
    if(this.botState==='dodge') moveAng=this.dodgeAng;

    // Поворот — у лёгкого медленнее
    const da=angDiff(moveAng,this.angle);
    this.angle+=Math.sign(da)*Math.min(Math.abs(da), p.turnRate*dt);
    this.tryMove(Math.cos(this.angle)*this.spd*p.speed*dt, Math.sin(this.angle)*this.spd*p.speed*dt);

    // Стрельба — угол допуска зависит от сложности
    const aimAng=Math.atan2(player.y-this.y, player.x-this.x);
    // На лёгком — иногда промахиваемся (не стреляем даже если в прицеле)
    const shootRoll = botDifficulty==='easy' ? Math.random()>0.4 : true;
    if(Math.abs(angDiff(this.angle,aimAng))<p.shootAngle && player.alive && shootRoll){
      this.shoot();
    }
  }

  // ── ПРОФИ БОТ — полноценный ИИ ──
  _updateBotPro(dt, player, p, nearBonus){
    // Профи думает каждый кадр — оценивает обстановку

    // 1. ТАКТИКА: если HP низкий — уходит и ищет лечение
    if(this.lives===1){
      const healBonus=bonusItems.find(b=>b.alive&&b.type==='heal');
      if(healBonus){this.botTarget=healBonus; this.botState='grab_bonus';}
    }

    // 2. ПРЕДСКАЗАНИЕ позиции игрока (упреждение)
    const dist=Math.sqrt((player.x-this.x)**2+(player.y-this.y)**2);
    const travelTime=dist/BULLET_SPEED;
    const predX=player.x+Math.cos(player.angle)*player.spd*travelTime*0.6;
    const predY=player.y+Math.sin(player.angle)*player.spd*travelTime*0.6;

    // 3. ПОЗИЦИОНИРОВАНИЕ: держим дистанцию 3-6 тайлов
    const optDist=TILE*4.5;
    let targetX, targetY;
    if(this.botState==='grab_bonus'&&this.botTarget){
      if(!bonusItems.includes(this.botTarget)){this.botState='hunt'; this.botTarget=null; targetX=predX; targetY=predY;}
      else{targetX=this.botTarget.x; targetY=this.botTarget.y;}
    } else if(dist<TILE*2.5 && this.botState!=='dodge'){
      // Слишком близко — отходим
      const awayAng=Math.atan2(this.y-player.y, this.x-player.x);
      targetX=this.x+Math.cos(awayAng)*optDist;
      targetY=this.y+Math.sin(awayAng)*optDist;
    } else {
      targetX=predX; targetY=predY;
    }

    if(this.botState==='dodge'){
      // Профи при уклонении идёт к ближайшей стене как укрытию
      targetX=this.x+Math.cos(this.dodgeAng)*TILE*3;
      targetY=this.y+Math.sin(this.dodgeAng)*TILE*3;
    }

    // 4. PATHFINDING (часто обновляем)
    this.pathT-=dt;
    if(this.pathT<=0){
      this.pathT=p.pathTime;
      const tx2=Math.max(0,Math.min(mapW-1,Math.floor(targetX/TILE)));
      const ty2=Math.max(0,Math.min(mapH-1,Math.floor(targetY/TILE)));
      this.path=findPath(this.tx,this.ty,tx2,ty2);
    }
    let moveAng=Math.atan2(targetY-this.y, targetX-this.x);
    if(this.path&&this.path.length>1){
      const nxt=this.path[1];
      const nx=nxt.x*TILE+TILE/2, ny=nxt.y*TILE+TILE/2;
      const dx=nx-this.x, dy=ny-this.y;
      if(Math.sqrt(dx*dx+dy*dy)<TILE*0.5) this.path.shift();
      moveAng=Math.atan2(dy,dx);
    }

    // 5. ПОВОРОТ — плавный но быстрый
    const da=angDiff(moveAng,this.angle);
    this.angle+=Math.sign(da)*Math.min(Math.abs(da), p.turnRate*dt);
    this.tryMove(Math.cos(this.angle)*this.spd*p.speed*dt, Math.sin(this.angle)*this.spd*p.speed*dt);

    // 6. ПРИЦЕЛИВАНИЕ с упреждением
    const aimAng=Math.atan2(predY-this.y, predX-this.x);
    const aimDiff=Math.abs(angDiff(this.angle,aimAng));

    // Профи использует бонусы с умом
    if(player.alive && aimDiff<p.shootAngle){
      // Лазер — только в упор, ракету — издалека
      if(this.bonus==='laser' && dist<TILE*5) this.shoot();
      else if(this.bonus==='rocket' && dist>TILE*3) this.shoot();
      else if(this.bonus==='mine' && dist<TILE*2) this.shoot(); // мина под ноги
      else if(this.bonus==='triple') this.shoot();
      else if(!['laser','rocket'].includes(this.bonus)) this.shoot();
    }

    // 7. СТРАТЕГИЯ использования бонусов
    // Профи использует нюк когда игрок рядом
    if(this.bonus==='nuke' && dist<TILE*4){
      this.shoot();
    }
    // Телепорт — когда HP=1 и угрожают
    if(this.bonus==='teleport' && this.lives===1 && threatened){
      this.shoot();
    }
  }

  tryMove(dx,dy){
    // Призрак проходит только сквозь кирпичи, но НЕ сквозь стальные стены и границы
    if(this.ghost){
      const r=13,nx=this.x+dx,ny=this.y+dy;
      const ghostOk=(x,y)=>{
        const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);
        if(tx<0||ty<0||tx>=mapW||ty>=mapH)return false;
        const c=mapData[ty][tx];
        return c.type!=='steel';
      };
      if(ghostOk(nx-r,ny-r)&&ghostOk(nx+r,ny-r)&&ghostOk(nx-r,ny+r)&&ghostOk(nx+r,ny+r)){this.x=nx;this.y=ny;}
      else if(ghostOk(nx-r,this.y-r)&&ghostOk(nx+r,this.y-r)&&ghostOk(nx-r,this.y+r)&&ghostOk(nx+r,this.y+r)){this.x=nx;}
      else if(ghostOk(this.x-r,ny-r)&&ghostOk(this.x+r,ny-r)&&ghostOk(this.x-r,ny+r)&&ghostOk(this.x+r,ny+r)){this.y=ny;}
      return;
    }
    const r=13,nx=this.x+dx,ny=this.y+dy;
    const ok=(x,y)=>!wallAt(x,y);
    if(ok(nx-r,ny-r)&&ok(nx+r,ny-r)&&ok(nx-r,ny+r)&&ok(nx+r,ny+r)){this.x=nx;this.y=ny;}
    else if(ok(nx-r,this.y-r)&&ok(nx+r,this.y-r)&&ok(nx-r,this.y+r)&&ok(nx+r,this.y+r)){this.x=nx;}
    else if(ok(this.x-r,ny-r)&&ok(this.x+r,ny-r)&&ok(this.x-r,ny+r)&&ok(this.x+r,ny+r)){this.y=ny;}
  }

  hit(dmg,from){
    if(this.shield){spawnP(this.x,this.y,'#00ffff',10,90,0.4);snd_shield();return 'bounced';}
    if(this.ghost)return 'miss'; // призрак неуязвим
    this.hitFlash=0.14;this.lives=Math.max(0,this.lives-dmg);
    spawnP(this.x,this.y,this.col,16,115,0.65);
    updateLivesHUD();
    if(onlineMode&&isHost&&roomRef){
      // Синхронизируем жизни через Firebase
      fbSyncTankLives(this.pidx,this.lives);
    }
    if(this.lives<=0){this.die(from);return 'dead';}
    return 'hit';
  }

  die(killer){
    this.alive=false;
    if(killer){
      killer.kills++;
      const msgs=['БАБАХ!','КРЫШКА!','В ДУГУ!','БУМС!','КА-БУМ!','СНЕСЛО!'];
      spawnTxt(this.x,this.y-44,msgs[Math.floor(Math.random()*msgs.length)],'#ff4444',22);
      addKillFeed(`${killer.name} ➜ ${this.name}`);
    }
    spawnP(this.x,this.y,this.col,55,210,1.6,35);
    spawnP(this.x,this.y,'#ff8800',28,155,1.1,22);
    spawnP(this.x,this.y,'#ffff00',18,110,0.7,10);
    snd_explode(true);shake(1.6);flash('#ff4400',220);
    if(Math.random()<0.55){const type=B_TYPES[Math.floor(Math.random()*B_TYPES.length)];const bid='bd'+Date.now();const bonus={id:bid,x:this.x,y:this.y,type,age:0,alive:true,bob:0};bonusItems.push(bonus);if(onlineMode&&isHost&&roomRef)roomRef.child('bonuses/'+bid).set({x:bonus.x,y:bonus.y,type,alive:true});}
    setTimeout(()=>checkGameOver(),60);
  }

  drawTracks(){
    if(!this.alive&&!this.respawning) return;
    const ox=mapOffX, oy=mapOffY;
    for(const tr of this.tracks){
      const a=(tr.life/1.6)*0.15;
      ctx.save();
      ctx.globalAlpha=a;
      ctx.translate(tr.x+ox, tr.y+oy);
      ctx.rotate(tr.angle);
      // Верхняя и нижняя гусеница (танк смотрит вправо — гусеницы по Y)
      ctx.fillStyle='#111820';
      ctx.fillRect(-14,-13,28,4);  // верх
      ctx.fillRect(-14,9,28,4);    // низ
      ctx.restore();
    }
  }

  draw(){
    if(!this.alive&&!this.respawning)return;
    const ox=mapOffX,oy=mapOffY;
    const sx=this.x+ox,sy=this.y+oy;
    const alpha=this.respawning?(0.38+0.28*Math.sin(Date.now()*0.014)):(this.ghost?0.45:1);

    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(sx,sy);
    ctx.rotate(this.angle);

    // ── Свечение и спецэффекты ──
    if(this.hitFlash>0){ctx.shadowColor='#ffffff';ctx.shadowBlur=28;}
    else if(this.ghost){ctx.shadowColor='#aaaaff';ctx.shadowBlur=18;}
    else{ctx.shadowColor=this.col;ctx.shadowBlur=6;}

    // Щит
    if(this.shield){
      ctx.save();
      ctx.shadowColor='#00ffff'; ctx.shadowBlur=18;
      ctx.strokeStyle='rgba(0,255,255,0.6)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(0,255,255,0.2)'; ctx.lineWidth=1;
      for(let a=0;a<Math.PI*2;a+=Math.PI/3){
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*13,Math.sin(a)*13);
        ctx.lineTo(Math.cos(a+Math.PI/3)*13,Math.sin(a+Math.PI/3)*13);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Хакер — помехи (мигает)
    if(this.hackerTimer>0){
      ctx.shadowColor='#44ff44';ctx.shadowBlur=14;
      ctx.save();
      ctx.globalAlpha=0.3*Math.abs(Math.sin(Date.now()*0.02));
      ctx.fillStyle='#44ff44';
      ctx.fillRect(-16,-13,32,26);
      ctx.restore();
    }

    const bCol=this.frozen?'#88ccff':this.hitFlash>0?'#ffffff':this.col;

    // ── ГУСЕНИЦЫ — рисуем ПЕРВЫМИ (они под корпусом) ──
    // Танк смотрит вправо: гусеницы сверху и снизу корпуса
    ctx.fillStyle='rgba(0,0,0,0.7)';
    // Верхняя гусеница
    rr(ctx,-15,-13,30,5,2);ctx.fill();
    // Нижняя гусеница
    rr(ctx,-15,8,30,5,2);ctx.fill();
    // Звенья гусениц (анимированные)
    ctx.fillStyle='rgba(255,255,255,0.18)';
    const linkOffset=(Date.now()*0.08)%8;
    for(let i=0;i<6;i++){
      const xx=-14+i*5+linkOffset;
      if(xx>-15&&xx<14){
        ctx.fillRect(xx,-13,3,5);   // верх
        ctx.fillRect(xx,8,3,5);     // низ
      }
    }

    // ── КОРПУС — поверх гусениц ──
    ctx.fillStyle=bCol;
    ctx.shadowColor=this.ghost?'#aaaaff':bCol;
    ctx.shadowBlur=8;
    rr(ctx,-13,-8,26,16,3);ctx.fill();

    // Бронепластины поверх
    ctx.fillStyle=this.hitFlash>0?'#ffffff':this.acc;
    ctx.globalAlpha*=0.45;
    rr(ctx,-11,-7,22,14,2);ctx.fill();
    ctx.globalAlpha=alpha;

    // Детали — болты по углам
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.shadowBlur=0;
    const boltPos=[[-10,-6],[8,-6],[-10,5],[8,5]];
    for(const[bx2,by2]of boltPos){
      ctx.beginPath();ctx.arc(bx2,by2,1.5,0,Math.PI*2);ctx.fill();
    }

    // ── БАШНЯ ──
    ctx.fillStyle=bCol;
    ctx.shadowColor=bCol; ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
    // Кольцо башни
    ctx.strokeStyle=this.acc; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.stroke();
    // Люк
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();

    // ── СТВОЛ ──
    ctx.shadowColor=this.acc; ctx.shadowBlur=4;
    // Основание ствола
    ctx.fillStyle=this.acc;
    ctx.fillRect(6,-2.5,5,5);
    // Ствол
    ctx.fillRect(11,-1.5,9,3);
    // Дульный тормоз
    ctx.fillStyle=this.acc;
    ctx.fillRect(19,-2.5,3,5);

    // ── БОНУС-ВИЗУАЛЫ ──
    ctx.shadowBlur=0;
    if(this.bonus==='triple'){
      ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=8;
      ctx.fillRect(12,-7,8,3);
      ctx.fillRect(12,4,8,3);
    }
    if(this.bonus==='laser'){
      ctx.shadowColor='#ff00ff';ctx.shadowBlur=18;
      const g=ctx.createLinearGradient(20,0,38,0);
      g.addColorStop(0,'#ff00ff');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fillRect(20,-2,18,4);
    }
    if(this.bonus==='speed'){
      ctx.fillStyle='rgba(0,255,136,0.5)';
      ctx.fillRect(-20,-4,5,8);ctx.fillRect(-16,-3,3,6);
    }
    if(this.bonus==='ricochet'){
      ctx.strokeStyle='rgba(255,170,0,0.6)';ctx.lineWidth=1.5;
      ctx.shadowColor='#ffaa00';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(0,0,17,0,Math.PI*2);ctx.stroke();
    }
    if(this.bonus==='rapid'){
      ctx.fillStyle='#ffee00';ctx.shadowColor='#ffee00';ctx.shadowBlur=8;
      ctx.fillRect(12,-6,6,3);ctx.fillRect(12,3,6,3);
      ctx.fillRect(14,-2,10,4);
    }
    if(this.bonus==='magnet'){
      ctx.shadowColor='#cc44ff';ctx.shadowBlur=18;
      ctx.strokeStyle='#cc44ff';ctx.lineWidth=1.5;
      const t2=Date.now()*0.005;
      for(let a=0;a<Math.PI*2;a+=Math.PI/3){
        const r2=15+2*Math.sin(t2+a);
        ctx.beginPath();ctx.arc(Math.cos(a)*r2,Math.sin(a)*r2,2.5,0,Math.PI*2);ctx.stroke();
      }
    }
    if(this.bonus==='rocket'){
      ctx.fillStyle='#ff8800';ctx.shadowColor='#ff8800';ctx.shadowBlur=10;
      ctx.fillRect(14,-2,3,4); // ракета сбоку ствола
      ctx.fillRect(17,-4,8,3);
    }

    ctx.restore();

    // Заморозка — поверх всего (без поворота)
    if(this.frozen){
      ctx.save();
      ctx.globalAlpha=0.35;
      ctx.fillStyle='#88ddff';
      ctx.translate(sx,sy); ctx.rotate(this.angle);
      rr(ctx,-15,-14,30,28,3); ctx.fill();
      ctx.strokeStyle='#cceeff'; ctx.lineWidth=1;
      for(const[ex,ey]of[[-4,-3],[3,4],[-6,2],[4,-5]]){
        ctx.beginPath();
        ctx.moveTo(ex-2,ey); ctx.lineTo(ex+2,ey);
        ctx.moveTo(ex,ey-2); ctx.lineTo(ex,ey+2);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Имя игрока (онлайн)
    if(onlineMode||tanks.filter(t=>t).length>2){
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.7)';
      ctx.fillRect(sx-22,sy-34,44,13);
      ctx.fillStyle=this.col;
      ctx.font='bold 9px Courier New';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(this.name.substring(0,8),sx,sy-27);
      ctx.restore();
    }

    // HP-бар
    ctx.save();

function fireLaser(tank){

  ctx.save();ctx.strokeStyle='#ff00ff';ctx.lineWidth=9;ctx.shadowColor='#ff00ff';ctx.shadowBlur=35;ctx.globalAlpha=0.88;
  ctx.beginPath();ctx.moveTo(x+ox,y+oy2);

    x+=dx*TILE*0.28;y+=dy*TILE*0.28;dist+=TILE*0.28;
    const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);

  }
  ctx.lineTo(x+ox,y+oy2);ctx.stroke();ctx.restore();

//  ROCKETS — самонаводящиеся ракеты
// ══════════════════════════════════════════════════════════
function spawnRocket(tank){
  // Ищем ближайшего живого врага
  let target=null, minDist=Infinity;
  for(const t of tanks){
    if(!t||t===tank||!t.alive||t.respawning) continue;
    const dx=t.x-tank.x, dy=t.y-tank.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<minDist){minDist=d; target=t;}
  }
  if(!target){
    // Нет врага — обычная пуля
    spawnBullet(tank,tank.angle); return;
  }
  rockets.push({
    x: tank.x+Math.cos(tank.angle)*28,
    y: tank.y+Math.sin(tank.angle)*28,
    vx: Math.cos(tank.angle)*220,
    vy: Math.sin(tank.angle)*220,
    owner: tank,
    target,
    alive: true,
    age: 0,
    trail: [],
    // Параметры наведения: медленный поворот = не читерно
    // Ракета сначала летит прямо (0.4с), потом начинает наводиться
    homingDelay: 0.4,
    turnRate: 2.2,   // рад/с — достаточно чтобы догнать, но уклониться можно
    speed: 220,
  });
  // Звук запуска
  try{
    const ac=AC(),o=ac.createOscillator(),g=ac.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(300,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+0.3);
    g.gain.setValueAtTime(0.2,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.3);
  }catch(e){}
  spawnTxt(tank.x,tank.y-30,'🚀 '+tank.rocketAmmo,'#ff8800',14);
}

function updateRockets(dt){
  for(const r of rockets){
    if(!r.alive) continue;
    r.age+=dt;

    // Через 6 секунд — самоликвидация
    if(r.age>6){ rocketExplode(r); continue; }

    // Наведение: только после задержки и если цель жива
    if(r.homingDelay>0){
      r.homingDelay-=dt;
    } else if(r.target&&r.target.alive){
      const desired=Math.atan2(r.target.y-r.y, r.target.x-r.x);
      const cur=Math.atan2(r.vy,r.vx);
      let diff=angDiff(desired,cur);
      // Ограничиваем поворот — не читерно
      const maxTurn=r.turnRate*dt;
      diff=Math.sign(diff)*Math.min(Math.abs(diff),maxTurn);
      const newAngle=cur+diff;
      r.vx=Math.cos(newAngle)*r.speed;
      r.vy=Math.sin(newAngle)*r.speed;
    }

    // Трейл
    r.trail.push({x:r.x,y:r.y});
    if(r.trail.length>14) r.trail.shift();

    // Двигаем
    r.x+=r.vx*dt;
    r.y+=r.vy*dt;

    // Стены — ракета ПРОБИВАЕТ кирпичи, останавливается о сталь
    const tx=Math.floor(r.x/TILE), ty=Math.floor(r.y/TILE);
    if(tx<0||ty<0||tx>=mapW||ty>=mapH){ rocketExplode(r); continue; }
    const cell=mapData[ty][tx];
    if(cell.type==='steel'){ rocketExplode(r); continue; }
    if(cell.type==='brick'){
      // Пробивает кирпич (но теряет скорость)
      cell.hp=0; cell.type='empty';
      spawnP(r.x,r.y,'#cc8844',6,80,0.35);
      r.speed=Math.max(120, r.speed-30);
      if(onlineMode&&isHost&&roomRef) fbSyncMap();
    }

    // Попадание в танк
    for(const t of tanks){
      if(!t||t===r.owner||!t.alive||t.respawning) continue;
      const dx=r.x-t.x, dy=r.y-t.y;
      if(Math.sqrt(dx*dx+dy*dy)<18){
        t.hit(2,r.owner);
        rocketExplode(r); break;
      }
    }
  }
  rockets=rockets.filter(r=>r.alive);
}

function rocketExplode(r){
  r.alive=false;
  spawnP(r.x,r.y,'#ff8800',32,190,1.1,22);
  spawnP(r.x,r.y,'#ffcc00',18,140,0.75,14);
  spawnP(r.x,r.y,'#ff4400',12,90,0.5,8);
  snd_explode(false); shake(0.7); flash('#ff8800',140);
  spawnTxt(r.x,r.y-28,'💥','#ff8800',20);
}

function drawRockets(){
  for(const r of rockets){
    if(!r.alive) continue;
    const ox=mapOffX,oy=mapOffY;
    const angle=Math.atan2(r.vy,r.vx);
    // Трейл — огненный хвост
    for(let i=0;i<r.trail.length;i++){
      const a=(i/r.trail.length);
      ctx.globalAlpha=a*0.6;
      ctx.fillStyle=i>r.trail.length*0.7?'#ffcc00':'#ff6600';
      const sz=(a*6)+1;
      ctx.beginPath();
      ctx.arc(r.trail[i].x+ox,r.trail[i].y+oy,sz,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    // Корпус ракеты
    ctx.save();
    ctx.translate(r.x+ox,r.y+oy);
    ctx.rotate(angle);
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=18;
    // Тело
    ctx.fillStyle='#cc6600';
    ctx.fillRect(-14,-4,20,8);
    // Нос
    ctx.fillStyle='#ff4400';
    ctx.beginPath();
    ctx.moveTo(6,0); ctx.lineTo(-2,-4); ctx.lineTo(-2,4); ctx.closePath();
    ctx.fill();
    // Пламя сзади
    const flicker=0.7+0.3*Math.sin(r.age*20);
    ctx.fillStyle=`rgba(255,${Math.floor(150*flicker)},0,0.9)`;
    ctx.beginPath();
    ctx.moveTo(-14,0); ctx.lineTo(-14-8*flicker,-3); ctx.lineTo(-14-8*flicker,3); ctx.closePath();
    ctx.fill();
    ctx.restore();
    // Прицельная линия к цели (слабая)
    if(r.target&&r.target.alive){
      ctx.save();
      ctx.globalAlpha=0.12;
      ctx.strokeStyle='#ff8800'; ctx.lineWidth=1; ctx.setLineDash([4,6]);
      ctx.beginPath();
      ctx.moveTo(r.x+ox,r.y+oy);
      ctx.lineTo(r.target.x+ox,r.target.y+oy);
      ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function wallAt(x,y){const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);if(tx<0||ty<0||tx>=mapW||ty>=mapH)return true;return mapData[ty][tx].type!=='empty';}
function angDiff(a,b){let d=a-b;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d;}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}

let fbUploadTimer=0;

function fbSyncMap(){
  if(!roomRef||!isHost)return;
  // Компактная сериализация карты: только изменённые кирпичи
  const bricks={};
  for(let y=0;y<mapH;y++)for(let x=0;x<mapW;x++){
    const c=mapData[y][x];
    if(c.type==='brick'&&c.hp<WALL_HP)bricks[x+','+y]=c.hp;
    if(c.type==='empty'&&!(x===0||y===0||x===mapW-1||y===mapH-1))bricks[x+','+y]=0;
  }
  roomRef.child('mapPatch').set(bricks);
}

function fbApplyMapPatch(patch){
  if(!patch)return;
  for(const k of Object.keys(patch)){
    const[sx,sy]=k.split(',');const x=parseInt(sx),y=parseInt(sy);
    if(x<0||y<0||x>=mapW||y>=mapH)continue;
    const hp=patch[k];
    if(hp===0)mapData[y][x]={type:'empty',hp:0};
    else if(hp>0)mapData[y][x]={type:'brick',hp};
  }
}

function fbSyncTankLives(pidx,lives){
  if(!roomRef||!isHost)return;
  roomRef.child('lives/'+pidx).set(lives);
}

// Upload my position  (вызывается каждый кадр, throttled до 20fps)
function fbUploadMe(dt){

  };

}

class Joystick{
  constructor(bx,by,r,type,pidx){this.bx=bx;this.by=by;this.r=r;this.type=type;this.pidx=pidx;this.active=false;this.tid=null;this.sx=0;this.sy=0;this.dx=0;this.dy=0;}
  start(id,x,y){this.active=true;this.tid=id;this.move(x,y);}
  move(x,y){const dx=x-this.bx,dy=y-this.by,d=Math.sqrt(dx*dx+dy*dy),mx=this.r*0.68;if(d>mx){this.sx=(dx/d)*mx;this.sy=(dy/d)*mx;}else{this.sx=dx;this.sy=dy;}this.dx=dx/this.r;this.dy=dy/this.r;const l=Math.sqrt(this.dx*this.dx+this.dy*this.dy);if(l>1){this.dx/=l;this.dy/=l;}}
  end(){this.active=false;this.tid=null;this.sx=0;this.sy=0;this.dx=0;this.dy=0;}
  draw(){const col=P_COLORS[this.pidx%P_COLORS.length][0];ctx.save();ctx.beginPath();ctx.arc(this.bx,this.by,this.r,0,Math.PI*2);ctx.strokeStyle=col+'55';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=col+'0d';ctx.fill();ctx.strokeStyle=col+'18';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(this.bx-this.r,this.by);ctx.lineTo(this.bx+this.r,this.by);ctx.moveTo(this.bx,this.by-this.r);ctx.lineTo(this.bx,this.by+this.r);ctx.stroke();const sx=this.bx+this.sx,sy=this.by+this.sy;ctx.beginPath();ctx.arc(sx,sy,this.r*0.31,0,Math.PI*2);const g=ctx.createRadialGradient(sx,sy,2,sx,sy,this.r*0.31);g.addColorStop(0,col+(this.active?'ff':'88'));g.addColorStop(1,col+(this.active?'99':'33'));ctx.fillStyle=g;ctx.fill();ctx.strokeStyle=col+(this.active?'cc':'44');ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=col+(this.active?'ff':'77');ctx.font=`bold ${Math.round(this.r*0.3)}px Courier New`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.type==='shoot'?'🔥':'✛',sx,sy);ctx.restore();}
}
