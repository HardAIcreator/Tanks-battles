function lobbyAction(){
  try{AC().resume();}catch(e){}
  const name=(document.getElementById('inp-name').value||'ИГРОК').toUpperCase().substring(0,12);
  if(lobbyAction_mode==='create'){
    doCreateRoom(name);
  } else {
    const code=document.getElementById('inp-room').value.toUpperCase().trim();
    if(code.length<4){document.getElementById('lobby-status').textContent='⚠ Введи код комнаты';return;}
    doJoinRoom(name,code);
  }
}

function doCreateRoom(name){
  document.getElementById('lobby-status').textContent='⏳ Создание комнаты...';
  roomCode=genCode();
  myPid=db.ref().push().key;
  const code=roomCode;
  roomRef=db.ref('rooms/'+code);

  // Размер карты по ориентации хоста
  const W2=window.innerWidth, H2=window.innerHeight;
  const isPortrait2 = H2 > W2;
  const MAP_W = isPortrait2 ? 9  : 15;
  const MAP_H = isPortrait2 ? 15 : 9;
  const seed=Math.floor(Math.random()*99999);

  // Данные хоста — координаты в тайлах (конвертируем при старте игры)
  const playerData={name,color:0,index:0,lives:MAX_LIVES,
    x:2*44+22, y:2*44+22, angle:0,
    bonus:'',frozen:0,shield:0,hitFlash:0,kills:0,alive:1,
    ts:firebase.database.ServerValue.TIMESTAMP};
  roomRef.child('players/'+myPid).set(playerData);
  roomRef.child('players/'+myPid).onDisconnect().remove();
  roomRef.child('meta').set({
    host:myPid, seed, mapW:MAP_W, mapH:MAP_H,
    state:'waiting', created:firebase.database.ServerValue.TIMESTAMP
  });
  roomRef.child('meta').onDisconnect().update({state:'closed'});

  document.getElementById('lobby-status').textContent='✅ Код комнаты: '+code+'\nОжидаем игроков...';
  document.getElementById('btn-lobby-go').textContent='▶ НАЧАТЬ';
  document.getElementById('btn-lobby-go').onclick=()=>doStartOnlineGame();

  // Слушаем игроков
  watchLobbyPlayers(code);
  isHost=true;myPlayerIndex=0;
}

function doJoinRoom(name,code){
  document.getElementById('lobby-status').textContent='⏳ Поиск комнаты '+code+'...';
  const ref=db.ref('rooms/'+code+'/meta');
  ref.once('value',snap=>{
    const meta=snap.val();
    if(!meta||meta.state==='closed'){document.getElementById('lobby-status').textContent='❌ Комната не найдена или закрыта';return;}
    roomCode=code;roomRef=db.ref('rooms/'+code);myPid=db.ref().push().key;
    isHost=false;

    // Считаем сколько игроков уже есть
    roomRef.child('players').once('value',snap2=>{
      const existing=snap2.val()||{};
      const idx=Object.keys(existing).length;
      myPlayerIndex=idx;
      const SPAWNS=[[TILE*2+TILE/2,TILE*2+TILE/2],[((meta.mapW||14)-3)*TILE+TILE/2,((meta.mapH||9)-3)*TILE+TILE/2],[TILE*2+TILE/2,((meta.mapH||9)-3)*TILE+TILE/2],[((meta.mapW||14)-3)*TILE+TILE/2,TILE*2+TILE/2]];
      const sp=SPAWNS[idx%4];
      const playerData={name,color:idx%4,index:idx,lives:MAX_LIVES,x:sp[0],y:sp[1],
        angle:idx===0?0:idx===1?Math.PI:idx===2?Math.PI/2:-Math.PI/2,
        bonus:'',frozen:0,shield:0,hitFlash:0,kills:0,alive:1,
        ts:firebase.database.ServerValue.TIMESTAMP};
      roomRef.child('players/'+myPid).set(playerData);
      roomRef.child('players/'+myPid).onDisconnect().remove();
      document.getElementById('lobby-status').textContent='✅ В комнате '+code+'\nОжидаем старт от хоста...';
      watchLobbyPlayers(code);
      // Слушаем старт
      roomRef.child('meta/state').on('value',s=>{if(s.val()==='playing')beginOnlineGame(meta);});
    });
  });
}

function watchLobbyPlayers(code){
  if(lobbyPlayersRef)lobbyPlayersRef.off();
  lobbyPlayersRef=db.ref('rooms/'+code+'/players');
  lobbyPlayersRef.on('value',snap=>{
    const players=snap.val()||{};
    const names=Object.values(players).map(p=>`${P_COLORS[p.color||0][2]}: ${p.name}`);
    document.getElementById('lobby-players').textContent=names.join('  |  ');
  });
}

function doStartOnlineGame(){
  if(!isHost||!roomRef)return;
  roomRef.child('meta/state').set('playing');
  roomRef.child('meta').once('value',snap=>{beginOnlineGame(snap.val());});
}

function beginOnlineGame(meta){
  document.getElementById('lobby').style.display='none';
  document.getElementById('rematch-screen').style.display='none';
  if(lobbyPlayersRef){lobbyPlayersRef.off();lobbyPlayersRef=null;}
  onlineMode=true;
  currentMode=99;

  canvas=document.getElementById('gameCanvas');
  ctx=canvas.getContext('2d');
  const W=window.innerWidth, H=window.innerHeight;
  canvas.width=W; canvas.height=H;

  // Размер карты из мета (задан хостом)
  mapW=parseInt(meta.mapW)||9;
  mapH=parseInt(meta.mapH)||15;

  // TILE: подбираем так чтобы карта точно влезала (с учётом HUD и джойстиков)
  TILE=calcTile(mapW, mapH);

  mapData=genMap(mapW,mapH,parseInt(meta.seed)||42);

  particles=[];bullets=[];bonusItems=[];tanks=[];mines=[];floatingTexts=[];weatherParts=[];rockets=[];
  gameTime=0;shakeTimer=0;weatherType='none';lastEventAt=0;bonusTimer=BONUS_INT;

  // Спавн-точки — одинаковы для всех (по mapW/mapH из мета)
  const SPAWNS=[
    [TILE*2+TILE/2,                   TILE*2+TILE/2],
    [(mapW-3)*TILE+TILE/2,            (mapH-3)*TILE+TILE/2],
    [TILE*2+TILE/2,                   (mapH-3)*TILE+TILE/2],
    [(mapW-3)*TILE+TILE/2,            TILE*2+TILE/2],
  ];

  // Создаём свой танк
  const myName=(document.getElementById('inp-name').value||'ИГРОК').toUpperCase().substring(0,12);
  const me=new Tank(SPAWNS[myPlayerIndex%4][0],SPAWNS[myPlayerIndex%4][1],myPlayerIndex,false,myPlayerIndex,myName);
  tanks[myPlayerIndex]=me;

  // ── Слушаем других игроков ──
  roomRef.child('players').on('value',snap=>{
    const players=snap.val()||{};
    for(const[pid,data]of Object.entries(players)){
      if(pid===myPid)continue;
      const idx=parseInt(data.index)||0;
      if(!tanks[idx]){
        const rt=new Tank(
          data.x||SPAWNS[idx%4][0], data.y||SPAWNS[idx%4][1],
          idx, false, idx, data.name||'?'
        );
        rt.remote=true; tanks[idx]=rt;
        updateLivesHUD();
      }
      const rt=tanks[idx]; if(!rt)continue;
      rt.remote=true;
      // Плавная интерполяция позиции
      rt.x=data.x!=null?data.x:rt.x;
      rt.y=data.y!=null?data.y:rt.y;
      rt.angle=data.angle!=null?data.angle:rt.angle;
      rt.lives=data.lives!=null?data.lives:rt.lives;
      rt.bonus=data.bonus||null;
      rt.frozen=!!data.frozen; rt.shield=!!data.shield;
      rt.hitFlash=data.hitFlash?0.12:0;
      rt.kills=data.kills||0;
      if(data.alive===0||rt.lives<=0)rt.alive=false; else rt.alive=true;
      updateLivesHUD();
    }
    // Убираем ушедших игроков
    for(let i=0;i<tanks.length;i++){
      if(!tanks[i]||!tanks[i].remote)continue;
      const found=Object.values(players).find(v=>parseInt(v.index)===i);
      if(!found){tanks[i].lives=0;tanks[i].alive=false;updateLivesHUD();}
    }
  });

  // ── Синхронизация пуль: хост пишет, все читают ──
  // Хост пишет в shots/{id} при каждом выстреле
  // Не-хост слушает child_added и создаёт пулю локально для отображения
  if(!isHost){
    let lastShotKey=null;
    roomRef.child('shots').limitToLast(20).on('child_added',snap=>{
      if(lastShotKey===snap.key)return; // пропускаем дубли при подключении
      lastShotKey=snap.key;
      const d=snap.val(); if(!d)return;
      // Создаём визуальную пулю на клиенте не-хоста
      const ownerTank=tanks[parseInt(d.pidx)];
      if(!ownerTank)return;
      const ang=d.angle;
      bullets.push({
        x:d.x+Math.cos(ang)*35, y:d.y+Math.sin(ang)*35,
        vx:Math.cos(ang)*BULLET_SPEED, vy:Math.sin(ang)*BULLET_SPEED,
        owner:ownerTank, alive:true, trail:[], age:0,
        ricochet:false, bounces:0,
        visualOnly:true // не считает урон — только отображение
      });
    });
  }

  // ── Бонусы (хост пишет, все читают) ──
  roomRef.child('bonuses').on('child_added',snap=>{
    const d=snap.val(); const bid=snap.key;
    if(!bonusItems.find(b=>b.id===bid))
      bonusItems.push({id:bid,x:d.x,y:d.y,type:d.type,age:0,alive:true,bob:Math.random()*Math.PI*2});
  });
  roomRef.child('bonuses').on('child_removed',snap=>{
    const bid=snap.key; const b=bonusItems.find(b=>b.id===bid); if(b)b.alive=false;
  });

  // ── Патч карты (хост пишет при разрушении стен) ──
  roomRef.child('mapPatch').on('value',snap=>{fbApplyMapPatch(snap.val());});

  // ── Жизни (хост пишет при уроне) ──
  roomRef.child('lives').on('value',snap=>{
    const lives=snap.val(); if(!lives)return;
    for(const[idx,v]of Object.entries(lives)){
      const i=parseInt(idx);
      if(tanks[i]){tanks[i].lives=v; if(v<=0)tanks[i].alive=false; updateLivesHUD();}
    }
  });

  // ── Бонусы у игроков (хост пишет) ──
  roomRef.child('playerBonuses').on('value',snap=>{
    const pb=snap.val(); if(!pb)return;
    for(const[idx,btype]of Object.entries(pb)){
      const i=parseInt(idx);
      if(tanks[i]&&i!==myPlayerIndex){tanks[i].bonus=btype||null;updateBonusHUD(i,btype||null);}
    }
  });

  // ── Хост слушает выстрелы гостей и создаёт пули ──
  if(isHost){
    let processedShots=new Set();
    roomRef.child('shots').limitToLast(30).on('child_added',snap=>{
      if(processedShots.has(snap.key))return;
      processedShots.add(snap.key);
      const d=snap.val(); if(!d)return;
      const pidx=parseInt(d.pidx);
      if(pidx===myPlayerIndex)return; // свои уже добавлены локально
      const ownerTank=tanks[pidx]; if(!ownerTank)return;
      const ang=d.angle;
      if(d.bonus==='triple'){
        [-0.3,0,0.3].forEach(a=>bullets.push({x:d.x+Math.cos(ang+a)*35,y:d.y+Math.sin(ang+a)*35,vx:Math.cos(ang+a)*BULLET_SPEED,vy:Math.sin(ang+a)*BULLET_SPEED,owner:ownerTank,alive:true,trail:[],age:0,ricochet:ownerTank.ricochet||false,bounces:0}));
      } else if(d.bonus==='mine'){
        mines.push({x:d.x,y:d.y,owner:ownerTank,armed:false,armT:1.5,alive:true,age:0,blink:0});
      } else {
        bullets.push({x:d.x+Math.cos(ang)*35,y:d.y+Math.sin(ang)*35,vx:Math.cos(ang)*BULLET_SPEED,vy:Math.sin(ang)*BULLET_SPEED,owner:ownerTank,alive:true,trail:[],age:0,ricochet:ownerTank.ricochet||false,bounces:0});
      }
      snd_shoot(d.bonus==='laser');
    });
  }
  const pingInterval=setInterval(()=>{
    if(!roomRef){clearInterval(pingInterval);return;}
    fbPingStart=Date.now();
    roomRef.child('ping/'+myPid).set(Date.now());
  },2000);
  roomRef.child('ping/'+myPid).on('value',()=>{if(fbPingStart)fbPing=Date.now()-fbPingStart;});

  // ── HUD ──
  document.getElementById('hud').style.display='flex';
  document.getElementById('pname1').textContent=myName;
  document.getElementById('pname2').textContent='';

  // ── ДЖОЙСТИКИ — большие, внизу экрана ──
  const jr=Math.min(72, W*0.095);
  const jm=jr+20;
  joysticks={
    p0Move:  new Joystick(jm,    H-jm, jr,  'move',  myPlayerIndex),
    p0Shoot: new Joystick(W-jm,  H-jm, jr,  'shoot', myPlayerIndex),
  };

  setupInput();
  gameState='countdown';
  doCountdown(()=>{
    gameState='playing';
    lastTime=performance.now();
    if(animFrame)cancelAnimationFrame(animFrame);
    gameLoop(lastTime);
  });
}

// ══════════════════════════════════════════════════════════
//  LOCAL GAME INIT
// ══════════════════════════════════════════════════════════
function initCanvas(mW, mH){
  canvas=document.getElementById('gameCanvas');
  ctx=canvas.getContext('2d');
  const W=window.innerWidth, H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  TILE=calcTile(mW, mH);
}

function startGame(mode){
  try{AC().resume();}catch(e){}
  onlineMode=false; currentMode=mode;
  document.getElementById('menu').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('game-over-screen').style.display='none';
  document.getElementById('rematch-screen').style.display='none';

  const W=window.innerWidth, H=window.innerHeight;
  const isPortrait = H > W;
  // Карта: вертикальный экран → узкая и длинная, горизонтальный → широкая
  const baseMapW = isPortrait ? 9 : 15;
  const baseMapH = isPortrait ? 15 : 9;

  initCanvas(baseMapW, baseMapH);
  mapW = baseMapW;
  mapH = baseMapH;

  mapData=genMap(mapW,mapH,Date.now()%99999);
  particles=[];bullets=[];bonusItems=[];tanks=[];mines=[];floatingTexts=[];weatherParts=[];rockets=[];
  gameTime=0;shakeTimer=0;weatherType='none';lastEventAt=0;bonusTimer=BONUS_INT;

  const t1=new Tank(TILE*2+TILE/2, TILE*2+TILE/2, 0,false,0,P_COLORS[0][2]);
  tanks.push(t1);
  if(mode===1){
    const bot=new Tank((mapW-3)*TILE+TILE/2,(mapH-3)*TILE+TILE/2,1,true,1,P_COLORS[1][2]);
    bot.angle=Math.PI; tanks.push(bot);
  } else {
    const t2=new Tank((mapW-3)*TILE+TILE/2,(mapH-3)*TILE+TILE/2,1,false,1,P_COLORS[1][2]);
    t2.angle=Math.PI; tanks.push(t2);
  }

  updateLivesHUD(); updateBonusHUD(0,null); updateBonusHUD(1,null);
  document.getElementById('pname1').textContent=P_COLORS[0][2];
  document.getElementById('pname2').textContent=mode===1?'BOT':P_COLORS[1][2];

  // Джойстики — большие, внизу экрана
  const cW=canvas.width, cH=canvas.height;
  const jr=Math.min(72, cW*0.095);  // больше чем раньше
  const jm=jr+20;
  if(mode===1){
    joysticks={
      p0Move:  new Joystick(jm,     cH-jm, jr,       'move',  0),
      p0Shoot: new Joystick(cW-jm,  cH-jm, jr,       'shoot', 0)
    };
  } else {
    joysticks={
      p0Move:  new Joystick(jm,             cH-jm, jr,       'move',  0),
      p0Shoot: new Joystick(jm+jr*2+16,     cH-jm, jr*0.82, 'shoot', 0),
      p1Move:  new Joystick(cW-jm,          cH-jm, jr,       'move',  1),
      p1Shoot: new Joystick(cW-jm-jr*2-16,  cH-jm, jr*0.82, 'shoot', 1)
    };
  }

  setupInput(); gameState='countdown';
  doCountdown(()=>{
    gameState='playing';
    lastTime=performance.now();
    if(animFrame)cancelAnimationFrame(animFrame);
    gameLoop(lastTime);
  });
}

function doCountdown(cb){
  const nums=['3','2','1','GO!'];let i=0;
  const el=document.getElementById('countdown'),num=document.getElementById('cnum');
  el.style.display='flex';
  const step=()=>{if(i>=nums.length){el.style.display='none';cb();return;}num.textContent=nums[i];num.style.color=nums[i]==='GO!'?'#00ff88':'#ffffff';num.style.animation='none';void num.offsetWidth;num.style.animation='cpop .9s ease';snd_countdown(nums[i]==='GO!');i++;setTimeout(step,900);};step();
}

// ══════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════
function setupInput(){
  canvas.ontouchstart=(e)=>{
    e.preventDefault();try{AC().resume();}catch(ex){}
    for(const t of e.changedTouches){
      const x=t.clientX,y=t.clientY;let hit=false;
      // Проверяем попадание в любой джойстик
      for(const jj of Object.values(joysticks)){
        if(jj.active)continue;
        const dx=x-jj.bx,dy=y-jj.by;
        if(Math.sqrt(dx*dx+dy*dy)<jj.r*1.8){jj.start(t.identifier,x,y);hit=true;break;}
      }
      // Тап вне джойстиков — стреляем ТОЛЬКО в локальном режиме 1 игрока
      // В онлайне (currentMode===99) и в режиме 2 игроков тап не стреляет
      if(!hit && currentMode===1){
        const myT=tanks[myPlayerIndex];
        if(myT?.alive)myT.shoot();
      }
    }
  };
  canvas.ontouchmove=(e)=>{
    e.preventDefault();
    for(const t of e.changedTouches)
      for(const jj of Object.values(joysticks))
        if(jj.tid===t.identifier)jj.move(t.clientX,t.clientY);
  };
  canvas.ontouchend=canvas.ontouchcancel=(e)=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      for(const jj of Object.values(joysticks)){
        if(jj.tid!==t.identifier)continue;
        if(jj.type==='shoot'&&jj.active){
          const tk=tanks[jj.pidx];
          if(tk?.alive){
            tk.shoot(); // fbShotEvent уже вызывается внутри shoot() при onlineMode
          }
        }
        jj.end();
      }
    }
  };
  const keys={};
  window.onkeydown=e=>{keys[e.key]=true;try{AC().resume();}catch(ex){}};
  window.onkeyup=e=>keys[e.key]=false;
  window._keys=keys;
}

function fbShotEvent(tank){
  if(!roomRef||!onlineMode)return;
  // Оба (хост и гость) пишут свои выстрелы в Firebase
  // Хост дополнительно спавнит пулю локально через shoot()
  // Гость — тоже спавнит локально, и транслирует в FB чтобы хост посчитал урон
  roomRef.child('shots').push({
    x:Math.round(tank.x), y:Math.round(tank.y),
    angle:+tank.angle.toFixed(4),
    pidx:myPlayerIndex,
    bonus:tank.bonus||'',
    ts:firebase.database.ServerValue.TIMESTAMP
  });
}

// ══════════════════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════════════════
function gameLoop(ts){
  if(gameState!=='playing')return;
  animFrame=requestAnimationFrame(gameLoop);
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  update(dt);render();
}

function update(dt){
  gameTime+=dt;updateTimer();

  const keys=window._keys||{};
  const myTank=tanks[myPlayerIndex];

  // P1 keyboard
  if(myTank?.alive&&!myTank.respawning&&!myTank.frozen){
    let kx=0,ky=0;
    if(keys['a']||keys['ArrowLeft'])kx=-1;if(keys['d']||keys['ArrowRight'])kx=1;
    if(keys['w']||keys['ArrowUp'])ky=-1;if(keys['s']||keys['ArrowDown'])ky=1;
    if(kx||ky){myTank.angle=Math.atan2(ky,kx);myTank.tryMove(Math.cos(myTank.angle)*myTank.spd*dt,Math.sin(myTank.angle)*myTank.spd*dt);}
    if(keys[' ']||keys['Enter'])myTank.shoot();
  }
  // P2 keyboard (локальный)
  if(currentMode===2&&tanks[1]?.alive&&!tanks[1].respawning&&!tanks[1].frozen){
    let kx=0,ky=0;if(keys['j'])kx=-1;if(keys['l'])kx=1;if(keys['i'])ky=-1;if(keys['k'])ky=1;
    if(kx||ky){tanks[1].angle=Math.atan2(ky,kx);tanks[1].tryMove(Math.cos(tanks[1].angle)*tanks[1].spd*dt,Math.sin(tanks[1].angle)*tanks[1].spd*dt);}
    if(keys['u']||keys['o'])tanks[1].shoot();
  }

  applyJoy(myPlayerIndex,dt);
  if(currentMode===2)applyJoy(1,dt);

  for(const t of tanks)if(t)t.update(dt);

  // Bullets (физика только у хоста в онлайне, у всех в оффлайне)
  const isPhysics=!onlineMode||isHost;
  if(isPhysics){
    for(const b of bullets){
      if(!b.alive)continue;
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>8)b.trail.shift();

      // Двигаем за шаг — делим на подшаги для точного рикошета
      const steps=3;
      const sdx=b.vx*dt/steps, sdy=b.vy*dt/steps;
      let killed=false;

      for(let s=0;s<steps&&!killed&&b.alive;s++){
        const prevX=b.x, prevY=b.y;
        b.x+=sdx; b.y+=sdy;
        b.age+=dt/steps;

        if(b.age>5){b.alive=false;break;}

        const tx=Math.floor(b.x/TILE), ty=Math.floor(b.y/TILE);
        if(tx<0||ty<0||tx>=mapW||ty>=mapH){b.alive=false;break;}

        const cell=mapData[ty][tx];
        const isWall=(cell.type==='steel'||cell.type==='brick');

        if(isWall){
          if(b.ricochet&&b.bounces<4){
            // --- Правильный рикошет по нормали стены ---
            // Откатываем позицию до предыдущей
            b.x=prevX; b.y=prevY;

            // Определяем с какой стороны пуля вошла в стену
            const prevTx=Math.floor(prevX/TILE), prevTy=Math.floor(prevY/TILE);
            const hitX=(prevTx!==tx); // врезались по горизонтали
            const hitY=(prevTy!==ty); // врезались по вертикали

            if(hitX&&hitY){
              // Угол — отражаем оба компонента
              b.vx=-b.vx; b.vy=-b.vy;
            } else if(hitX){
              b.vx=-b.vx;
            } else {
              b.vy=-b.vy;
            }

            b.bounces++;
            snd_ricco();

            // Выдвигаем пулю на 1px от стены чтобы не застряла
            b.x+=Math.sign(b.vx)*2;
            b.y+=Math.sign(b.vy)*2;

            // Если это кирпич — рикошет не разрушает его (только стальные отражают)
            // кирпичи при рикошете всё же получают урон
            if(cell.type==='brick'){
              cell.hp--;
              spawnP(b.x,b.y,'#cc8844',5,60,0.28);
              if(cell.hp<=0){cell.type='empty';spawnP(b.x,b.y,'#ff8844',10,80,0.45);}
              if(onlineMode&&isHost&&roomRef)fbSyncMap();
            }

          } else if(cell.type==='steel'){
            // Обычная пуля о сталь — гибнет
            spawnP(b.x,b.y,'#99aabb',6,60,0.22);
            snd_wall(); b.alive=false;
          } else if(cell.type==='brick'){
            // Обычная пуля о кирпич
            cell.hp--;
            spawnP(b.x,b.y,'#cc8844',7,70,0.32);
            snd_wall();
            if(cell.hp<=0){cell.type='empty';spawnP(b.x,b.y,'#ff8844',12,90,0.5);}
            b.alive=false;
            if(onlineMode&&isHost&&roomRef)fbSyncMap();
          }
        }

        if(!b.alive)break;

        // Попадание в танк
        for(const t of tanks){
          if(!t||t===b.owner||!t.alive||t.respawning)continue;
          const dx=b.x-t.x, dy=b.y-t.y;
          if(Math.sqrt(dx*dx+dy*dy)<20){
            const res=t.hit(1,b.owner);
            if(res==='bounced'){b.vx=-b.vx;b.vy=-b.vy;b.owner=t;}
            else if(res!=='miss'){b.alive=false;}
            break;
          }
        }
      }
    }
    bullets=bullets.filter(b=>b.alive);
  } else {
    // Не-хост: только визуал
    for(const b of bullets){
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>8)b.trail.shift();
      b.x+=b.vx*dt; b.y+=b.vy*dt; b.age+=dt;
    }
    bullets=bullets.filter(b=>b.age<5);
  }

  // Bonus pickups
  if(isPhysics){
    for(const bo of bonusItems){
      if(!bo.alive)continue;bo.age+=dt;bo.bob+=dt;
      for(const t of tanks){
        if(!t||!t.alive||t.respawning)continue;
        const dx=bo.x-t.x,dy=bo.y-t.y;
        if(Math.sqrt(dx*dx+dy*dy)<TILE*0.88){
          t.applyBonus(bo.type);bo.alive=false;
          if(onlineMode&&isHost&&roomRef)roomRef.child('bonuses/'+bo.id).remove();
          break;
        }
      }
      if(bo.age>14){bo.alive=false;if(onlineMode&&isHost&&roomRef&&bo.id)roomRef.child('bonuses/'+bo.id).remove();}
    }
    bonusItems=bonusItems.filter(b=>b.alive);
    bonusTimer-=dt*1000;if(bonusTimer<=0){spawnBonus();bonusTimer=BONUS_INT;}
  } else {
    for(const bo of bonusItems){bo.age+=dt;bo.bob+=dt;}
    bonusItems=bonusItems.filter(b=>b.alive&&b.age<14);
  }

  updateMines(dt);
  updateRockets(dt);
  tryRandomEvent();updateWeather(dt);

  // Shake
  if(shakeTimer>0){shakeTimer-=dt;const s=shakeTimer*8;canvas.style.transform=`translate(${(Math.random()-.5)*s}px,${(Math.random()-.5)*s}px)`;if(shakeTimer<=0)canvas.style.transform='';}
  if(quakeTimer>0){quakeTimer-=dt;if(Math.random()<0.12)shake(0.4);}

  for(const ft of floatingTexts){ft.y+=ft.vy*dt;ft.life-=dt;}floatingTexts=floatingTexts.filter(f=>f.life>0);
  for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.93;p.vy*=0.93;p.vy+=p.grav*dt;p.life-=dt;}particles=particles.filter(p=>p.life>0);

  // Firebase upload
  if(onlineMode){
    fbUploadMe(dt);
    // Ping display
    const pd=document.getElementById('pingdot'),pi=document.getElementById('ping-disp');
    if(pd){pd.className='ping-dot'+(fbPing>200?' bad':'');pi.textContent=fbPing?fbPing+'ms':'';}
  }
}

function applyJoy(pidx,dt){
  const t=tanks[pidx];if(!t||!t.alive||t.respawning||t.bot||t.frozen||t.remote)return;
  const joyKey= onlineMode ? 'p0' : 'p'+pidx;
  const mj=joysticks[joyKey+'Move'];
  const sj=joysticks[joyKey+'Shoot'];
  if(mj?.active&&(Math.abs(mj.dx)>0.07||Math.abs(mj.dy)>0.07)){
    // Инверсия управления при хакере
    const inv = t.hackerTimer>0 ? -1 : 1;
    t.angle=Math.atan2(mj.dy*inv,mj.dx*inv);
    const l=Math.sqrt(mj.dx*mj.dx+mj.dy*mj.dy);
    t.tryMove(Math.cos(t.angle)*t.spd*l*dt,Math.sin(t.angle)*t.spd*l*dt);
  }
  if(sj?.active){
    t.shoot();
  }
}

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
// Глобальные смещения карты — нужны и в update для физики
let mapOffX=0, mapOffY=0;

function calcMapOffset(){
  const W=canvas.width, H=canvas.height;
  const mapPxW=mapW*TILE, mapPxH=mapH*TILE;
  const hudH=46;
  const joyH=150; // высота зоны джойстиков
  const usableH=H-hudH-joyH;
  mapOffX=Math.max(0,Math.floor((W-mapPxW)/2));
  mapOffY=hudH+Math.max(0,Math.floor((usableH-mapPxH)/2));
}

function render(){
  const W=canvas.width,H=canvas.height;
  calcMapOffset();
  const ox=mapOffX, oy=mapOffY;
  const mapPxW=mapW*TILE, mapPxH=mapH*TILE;

  // Фон
  ctx.fillStyle='#060810'; ctx.fillRect(0,0,W,H);
  // Зона карты чуть темнее
  ctx.fillStyle='#040608'; ctx.fillRect(ox,oy,mapPxW,mapPxH);
  // Scanlines
  ctx.fillStyle='rgba(0,0,0,0.04)';
  for(let y2=0;y2<H;y2+=3) ctx.fillRect(0,y2,W,1);

  // Сетка внутри карты
  ctx.strokeStyle='#0b1420'; ctx.lineWidth=0.5;
  for(let x=0;x<=mapW;x++){ctx.beginPath();ctx.moveTo(ox+x*TILE,oy);ctx.lineTo(ox+x*TILE,oy+mapPxH);ctx.stroke();}
  for(let y2=0;y2<=mapH;y2++){ctx.beginPath();ctx.moveTo(ox,oy+y2*TILE);ctx.lineTo(ox+mapPxW,oy+y2*TILE);ctx.stroke();}

  // Тайлы карты
  for(let y2=0;y2<mapH;y2++) for(let x=0;x<mapW;x++){
    const cell=mapData[y2][x]; if(cell.type==='empty') continue;
    const px=ox+x*TILE, py=oy+y2*TILE;
    if(cell.type==='steel'){
      const g=ctx.createLinearGradient(px,py,px+TILE,py+TILE);
      g.addColorStop(0,'#1c2d42'); g.addColorStop(1,'#111e2e');
      ctx.fillStyle=g; ctx.fillRect(px,py,TILE,TILE);
      ctx.strokeStyle='#283e58'; ctx.lineWidth=1;
      ctx.strokeRect(px+1,py+1,TILE-2,TILE-2);
      ctx.fillStyle='#293f59';
      const cs=Math.min(4,TILE/10);
      ctx.fillRect(px+2,py+2,cs,cs); ctx.fillRect(px+TILE-cs-2,py+2,cs,cs);
      ctx.fillRect(px+2,py+TILE-cs-2,cs,cs); ctx.fillRect(px+TILE-cs-2,py+TILE-cs-2,cs,cs);
      ctx.fillStyle='rgba(255,255,255,0.03)'; ctx.fillRect(px,py,TILE,TILE/3);
    } else if(cell.type==='brick'){
      const r2=cell.hp/WALL_HP;
      ctx.fillStyle=`rgb(${Math.floor(125*r2+35)},${Math.floor(52*r2+12)},12)`;
      ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.38)';
      ctx.fillRect(px,py+TILE/2-1,TILE,2);
      ctx.fillRect(px+TILE/2-1,py,2,TILE/2);
      ctx.fillRect(px+TILE/4-1,py+TILE/2,2,TILE/2);
      ctx.fillRect(px+3*TILE/4-1,py+TILE/2,2,TILE/2);
      ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(px,py,TILE,3);
      if(cell.hp<WALL_HP){
        ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(px+TILE*0.2,py+TILE*0.1); ctx.lineTo(px+TILE*0.5,py+TILE*0.7);
        ctx.moveTo(px+TILE*0.7,py+TILE*0.2); ctx.lineTo(px+TILE*0.4,py+TILE*0.9);
        ctx.stroke();
      }
    }
  }

  // Бонусы
  for(const b of bonusItems){
    if(!b.alive) continue;
    const bob=Math.sin(b.bob*3)*3, pulse=Math.sin(b.bob*5)*0.18+0.82;
    const bx=b.x+ox, by2=b.y+oy+bob;
    ctx.save(); ctx.globalAlpha=pulse;
    ctx.shadowColor=B_COL[b.type]; ctx.shadowBlur=22;
    const gr=ctx.createRadialGradient(bx,by2,2,bx,by2,14);
    gr.addColorStop(0,B_COL[b.type]); gr.addColorStop(1,B_COL[b.type]+'44');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(bx,by2,14,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#fff';
    ctx.font='bold 12px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(B_SYM[b.type],bx,by2);
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(bx,by2,18,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-b.age/14)); ctx.stroke();
    ctx.restore();
  }

  // Мины
  for(const m of mines){
    if(!m.alive) continue;
    const pulse=m.armed?(0.65+0.35*Math.sin(m.blink*(m.armed?8:3))):0.5;
    const mx2=m.x+ox, my2=m.y+oy;
    ctx.save(); ctx.globalAlpha=pulse;
    ctx.shadowColor=m.armed?'#ff4444':'#888'; ctx.shadowBlur=m.armed?16:4;
    ctx.fillStyle=m.armed?'#ff3333':'#555';
    ctx.beginPath(); ctx.arc(mx2,my2,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 11px Courier New';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('!',mx2,my2); ctx.restore();
  }

  // Пули
  for(const b of bullets){
    for(let i=0;i<b.trail.length;i++){
      ctx.globalAlpha=(i/b.trail.length)*0.45;
      ctx.fillStyle='#ffee44';
      ctx.beginPath(); ctx.arc(b.trail[i].x+ox,b.trail[i].y+oy,3,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=14;
    ctx.fillStyle='#ffff99';
    ctx.beginPath(); ctx.arc(b.x+ox,b.y+oy,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Следы — рисуются ДО танков (под ними)
  for(const t of tanks) if(t) t.drawTracks();

  // Танки — передаём смещение через глобал (draw использует mapOffX/mapOffY)
  for(const t of tanks) if(t) t.draw();

  // Ракеты
  drawRockets();

  // Частицы
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=5;
    ctx.fillRect(p.x+ox-p.size/2,p.y+oy-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Погода
  drawWeather();

  // Плавающий текст
  for(const ft of floatingTexts){
    ctx.save();
    ctx.globalAlpha=Math.min(1,ft.life/ft.maxLife*2.2);
    ctx.fillStyle=ft.col; ctx.shadowColor=ft.col; ctx.shadowBlur=14;
    const sc=1+0.2*(1-ft.life/ft.maxLife);
    ctx.font=`bold ${ft.sz}px Courier New`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.translate(ft.x+ox,ft.y+oy); ctx.scale(sc,sc);
    ctx.fillText(ft.txt,0,0);
    ctx.restore();
  }

  // Джойстики (в экранных координатах — без смещения)
  for(const jj of Object.values(joysticks)) jj.draw();

  // Бонус-бары
  for(let i=0;i<tanks.length;i++){
    const t=tanks[i]; if(!t) continue;
    if(t.bonus&&t.alive){
      const bx=i===0?10:W-110, by2=50, ratio=t.bTimer/BONUS_DUR;
      ctx.fillStyle=B_COL[t.bonus]+'33'; ctx.fillRect(bx,by2,100,5);
      ctx.fillStyle=B_COL[t.bonus]; ctx.fillRect(bx,by2,100*ratio,5);
    }
    if(t.frozen&&t.alive){
      const bx=i===0?10:W-110;
      ctx.fillStyle='#88ddff33'; ctx.fillRect(bx,57,100,4);
      ctx.fillStyle='#88ddff'; ctx.fillRect(bx,57,100*(t.frozenT/3.5),4);
    }
  }

  // Разделитель P1/P2
  if(currentMode===2){
    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1; ctx.setLineDash([10,10]);
    ctx.beginPath(); ctx.moveTo(W/2,46); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);
  }

  // Бонус скоро
  const stb=Math.ceil(bonusTimer/1000);
  if(stb<=5&&(!onlineMode||isHost)){
    ctx.save();
    ctx.fillStyle=`rgba(255,215,0,${0.5+0.4*Math.sin(Date.now()*0.012)})`;
    ctx.font='bold 11px Courier New'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(`🎁 БОНУС ЧЕРЕЗ ${stb}с`,W/2,48);
    ctx.restore();
  }

  // Туман
  if(weatherType==='fog'){
    ctx.save(); ctx.fillStyle='rgba(170,200,230,0.45)';
    ctx.font='bold 10px Courier New'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('☁ ТУМАН',W/2,62); ctx.restore();
  }

  // Код комнаты
  if(onlineMode&&roomCode){
    ctx.save(); ctx.fillStyle='rgba(204,68,255,0.4)';
    ctx.font='bold 9px Courier New'; ctx.textAlign='right'; ctx.textBaseline='top';
    ctx.fillText('КОМНАТА: '+roomCode,W-10,48); ctx.restore();
  }
}

// ══════════════════════════════════════════════════════════
//  GAME OVER + REMATCH
// ══════════════════════════════════════════════════════════
function checkGameOver(){
  const alive=tanks.filter(t=>t&&t.lives>0);
  if(alive.length>1)return;
  gameState='over';

  // Сбрасываем все бонус-индикаторы в HUD
  for(let i=0;i<4;i++) updateBonusHUD(i,null);

  const winner=alive[0];
  const wName=winner?winner.name:'НИЧЬЯ';
  const m=Math.floor(gameTime/60),s=Math.floor(gameTime)%60;
  const statsStr=winner?`Время: ${m}:${String(s).padStart(2,'0')} · Убийств: ${winner.kills}`:'';

  if(onlineMode&&roomRef){
    // Онлайн: показываем экран реванша
    roomRef.child('meta/state').set('gameover');
    roomRef.child('rematch').remove(); // чистим голоса
    document.getElementById('rematch-winner').textContent=winner?`🏆 ${wName} ПОБЕДИЛ!`:'🤝 НИЧЬЯ!';
    document.getElementById('rematch-votes').textContent='';
    document.getElementById('rematch-status').textContent='Хочешь сыграть ещё?';
    const btn=document.getElementById('btn-rematch');
    btn.className='mbtn g'; btn.textContent='🔄 ИГРАТЬ СНОВА';
    document.getElementById('rematch-screen').style.display='flex';
    // Слушаем голоса
    listenRematchVotes();
  } else {
    // Локальный: обычный экран
    document.getElementById('game-over-screen').style.display='flex';
    document.getElementById('winner-text').textContent=winner?`🏆 ${wName} ПОБЕДИЛ!`:'🤝 НИЧЬЯ!';
    document.getElementById('stats-text').textContent=statsStr;
  }
}

let rematchVoteRef=null;
function listenRematchVotes(){
  if(!roomRef)return;
  if(rematchVoteRef)rematchVoteRef.off();
  rematchVoteRef=roomRef.child('rematch');
  rematchVoteRef.on('value',snap=>{
    const votes=snap.val()||{};
    // Считаем сколько всего игроков в комнате
    roomRef.child('players').once('value',psnap=>{
      const players=psnap.val()||{};
      const total=Object.keys(players).length;
      const yesVotes=Object.values(votes).filter(v=>v===true).length;
      document.getElementById('rematch-votes').textContent=`✅ Готовы: ${yesVotes} / ${total}`;
      if(yesVotes>=total&&total>0){
        // Все проголосовали — перезапускаем
        document.getElementById('rematch-status').textContent='Все готовы! Запуск...';
        if(isHost){
          // Хост инициирует перезапуск
          roomRef.child('meta').once('value',msn=>{
            const meta=msn.val();
            const newSeed=Math.floor(Math.random()*99999);
            roomRef.child('meta/seed').set(newSeed);
            roomRef.child('meta/state').set('playing');
            roomRef.child('bonuses').remove();
            roomRef.child('shots').remove();
            roomRef.child('lives').remove();
            roomRef.child('mapPatch').remove();
            roomRef.child('rematch').remove();
            roomRef.child('playerBonuses').remove();
          });
        }
      }
    });
  });
  // Слушаем перезапуск от хоста
  roomRef.child('meta/state').on('value',snap=>{
    if(snap.val()==='playing'&&gameState==='over'){
      document.getElementById('rematch-screen').style.display='none';
      if(rematchVoteRef){rematchVoteRef.off();rematchVoteRef=null;}
      roomRef.child('meta').once('value',msn=>{beginOnlineGame(msn.val());});
    }
  });
}

function voteRematch(){
  if(!roomRef||!myPid)return;
  roomRef.child('rematch/'+myPid).set(true);
  const btn=document.getElementById('btn-rematch');
  btn.className='mbtn g voted'; btn.textContent='✅ ГОТОВ!';
  document.getElementById('rematch-status').textContent='Ждём остальных...';
}

function showMenu(){
  gameState='menu';if(canvas)canvas.style.transform='';
  if(rematchVoteRef){rematchVoteRef.off();rematchVoteRef=null;}
  if(roomRef){roomRef.child('players/'+myPid).remove();roomRef=null;}
  onlineMode=false;roomCode='';
  // Сбрасываем все HUD-индикаторы
  for(let i=0;i<4;i++) updateBonusHUD(i,null);
  document.getElementById('menu').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('game-over-screen').style.display='none';
  document.getElementById('rematch-screen').style.display='none';
  document.getElementById('countdown').style.display='none';
  document.getElementById('lobby').style.display='none';
  if(animFrame)cancelAnimationFrame(animFrame);
}
function restartGame(){
  if(onlineMode){showMenu();}else{startGame(currentMode);}
}
window.addEventListener('resize',()=>{
  if((gameState==='playing'||gameState==='over')&&canvas){
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  }
});
