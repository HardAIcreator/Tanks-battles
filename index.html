}

#menu {

    }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            height: 100%;

        }

        canvas {
            display: block;
            touch-action: none;
        }

        /* ---------- МЕНЮ ---------- */
        #menu {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, #0d1b2a 0%, #020408 80%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: clamp(10px, 2.5vh, 18px);
            padding: 16px;
            overflow-y: auto;
        }

        #menu .tagline {
            font-size: clamp(9px, 2.5vw, 13px);
            color: #ff6b35;
            letter-spacing: 6px;
            text-align: center;
        }

        #menu h1 {
            font-size: clamp(22px, 6vw, 42px);
            color: #00e5ff;
            text-shadow: 0 0 20px #00e5ff, 0 0 60px #0055ff;
            letter-spacing: 4px;
            text-align: center;
            line-height: 1.2;
            animation: glow 2.5s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px #00e5ff, 0 0 40px #0055ff;
            }
            50% {
                text-shadow: 0 0 40px #00e5ff, 0 0 100px #0055ff, 0 0 160px #003388;
            }
        }

        .tank-anim {
            display: flex;
            gap: 24px;
            margin: 2px 0;
        }

        .tank-anim span {
            font-size: clamp(22px, 5vw, 36px);
            animation: tbob 1s ease-in-out infinite alternate;
        }

        .tank-anim span:nth-child(2) {
            animation-delay: .5s;
        }

        @keyframes tbob {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        /* ---------- КНОПКИ ---------- */
        .menu-btn {
            background: transparent;
            border: 2px solid #00e5ff;
            color: #00e5ff;
            font-family: 'Courier New', monospace;
            font-size: clamp(11px, 2vw, 14px);
            letter-spacing: 2px;
            padding: clamp(10px, 1.8vh, 14px) clamp(20px, 5vw, 44px);
            cursor: pointer;
            text-transform: uppercase;
            transition: all .2s;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
            width: min(280px, 85vw);
            text-align: center;
            border-radius: 4px;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #00e5ff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .2s;
            z-index: -1;
        }

        .menu-btn:hover::before,
        .menu-btn:active::before {
            transform: scaleX(1);
        }

        .menu-btn:hover,
        .menu-btn:active {
            color: #0a0a0f;
        }

        .menu-btn.p2 {
            border-color: #ff6b35;
            color: #ff6b35;
        }

        .menu-btn.p2::before {
            background: #ff6b35;
        }

        .menu-btn.online {
            border-color: #ffd700;
            color: #ffd700;
        }

        .menu-btn.online::before {
            background: #ffd700;
        }

        /* ---------- HUD ---------- */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 46px;
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: rgba(0, 0, 0, 0.82);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 50;
            pointer-events: none;
        }

        .hud-panel {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 130px;
        }

        .hud-panel.right {
            justify-content: flex-end;
        }

        .hud-name {
            font-size: 10px;
            color: #666;
            letter-spacing: 2px;
        }

        .hud-lives {
            display: flex;
            gap: 4px;
        }

        .life-icon {
            width: 15px;
            height: 15px;
            background: #00e5ff;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            transition: all .3s;
        }

        .life-icon.lost {
            background: #1a2030;
            transform: scale(0.7);
        }

        .life-icon.p2 {
            background: #ff6b35;
        }

        .bonus-pill {
            font-size: 9px;
            letter-spacing: 1px;
            border: 1px solid;
            padding: 2px 6px;
            display: none;
            animation: pillin .2s ease;
        }

        @keyframes pillin {
            from {
                transform: scale(0.4);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        #hud-timer {
            font-size: 11px;
            color: #555;
            letter-spacing: 2px;
        }

        #flash {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 300;
            opacity: 0;
            transition: opacity .08s;
        }

        #countdown {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 150;
            pointer-events: none;
        }

        #countdown span {
            font-size: clamp(60px, 15vw, 120px);
            color: #fff;
            text-shadow: 0 0 40px #00e5ff;
            animation: cpop .9s ease;
        }

        @keyframes cpop {
            0% {
                transform: scale(2.5);
                opacity: 0;
            }
            35% {

                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {

                opacity: 0;
            }

            position: absolute;

            flex-direction: column;

        }

        }

        // ══════════════════════════════════════════
        // АУДИО СИСТЕМА
        // ══════════════════════════════════════════
        let _ac = null;
        const AC = () => {
            if (!_ac) _ac = new(window.AudioContext || window.webkitAudioContext)();
            return _ac;
        };

        function snd_shoot(laser) {
            try {
                const a = AC();
                const o = a.createOscillator();
                const g = a.createGain();
                o.connect(g);
                g.connect(a.destination);

                if (laser) {
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(1400, a.currentTime);
                    o.frequency.exponentialRampToValueAtTime(150, a.currentTime + 0.35);
                    g.gain.setValueAtTime(0.28, a.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.35);
                    o.start();
                    o.stop(a.currentTime + 0.35);
                } else {
                    o.type = 'square';
                    o.frequency.setValueAtTime(380, a.currentTime);
                    o.frequency.exponentialRampToValueAtTime(70, a.currentTime + 0.1);
                    g.gain.setValueAtTime(0.15, a.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.1);
                    o.start();
                    o.stop(a.currentTime + 0.1);
                }
            } catch (e) {}
        }

        function snd_explode(big) {
            try {
                const a = AC();
                const len = big ? 0.9 : 0.45;
                const buf = a.createBuffer(1, a.sampleRate * len, a.sampleRate);
                const d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) {
                    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, big ? 1.2 : 1.8);
                }
                const src = a.createBufferSource();
                const g = a.createGain();
                const f = a.createBiquadFilter();
                f.type = 'lowpass';
                f.frequency.value = big ? 550 : 850;
                src.buffer = buf;
                src.connect(f);
                f.connect(g);
                g.connect(a.destination);
                g.gain.setValueAtTime(big ? 1.1 : 0.65, a.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + len);
                src.start();
            } catch (e) {}
        }

        function snd_pickup() {
            try {
                const a = AC();
                [523, 659, 784, 1047].forEach((f, i) => {
                    const o = a.createOscillator();
                    const g = a.createGain();
                    o.type = 'sine';
                    o.frequency.value = f;
                    g.gain.setValueAtTime(0.13, a.currentTime + i * 0.07);
                    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + i * 0.07 + 0.12);
                    o.connect(g);
                    g.connect(a.destination);
                    o.start(a.currentTime + i * 0.07);
                    o.stop(a.currentTime + i * 0.07 + 0.12);
                });
            } catch (e) {}
        }

        function snd_shield_hit() {
            try {
                const a = AC();
                const o = a.createOscillator();
                const g = a.createGain();
                o.type = 'sine';
                o.frequency.setValueAtTime(600, a.currentTime);
                o.frequency.exponentialRampToValueAtTime(200, a.currentTime + 0.15);
                g.gain.setValueAtTime(0.2, a.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.15);
                o.connect(g);
                g.connect(a.destination);
                o.start();
                o.stop(a.currentTime + 0.15);
            } catch (e) {}
        }

        function snd_freeze() {
            try {
                const a = AC();
                for (let i = 0; i < 6; i++) {
                    const o = a.createOscillator();
                    const g = a.createGain();
                    o.type = 'sine';
                    o.frequency.value = 800 + i * 200 + Math.random() * 100;
                    g.gain.setValueAtTime(0.06, a.currentTime + i * 0.03);
                    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + i * 0.03 + 0.15);
                    o.connect(g);
                    g.connect(a.destination);
                    o.start(a.currentTime + i * 0.03);
                    o.stop(a.currentTime + i * 0.03 + 0.15);
                }
            } catch (e) {}
        }

        function snd_countdown(go) {
            try {
                const a = AC();
                const o = a.createOscillator();
                const gn = a.createGain();
                o.type = 'square';
                o.frequency.value = go ? 880 : 440;
                gn.gain.setValueAtTime(0.18, a.currentTime);
                gn.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.14);
                o.connect(gn);

        // ══════════════════════════════════════════
        // ГЕНЕРАЦИЯ КАРТЫ
        // ══════════════════════════════════════════
        function genMap(w, h) {
            const m = [];
            for (let y = 0; y < h; y++) {
                m[y] = [];
                for (let x = 0; x < w; x++) {
                    m[y][x] = (x === 0 || y === 0 || x === w - 1 || y === h - 1) ?
                        { type: 'steel', hp: 999 } :
                        { type: 'empty', hp: 0 };
                }
            }

            // Кирпичные стены
            for (let y = 2; y < h - 2; y++) {
                for (let x = 2; x < w - 2; x++) {
                    if (Math.random() < 0.16 && !(x <= 3 && y <= 3) && !(x >= w - 4 && y >= h - 4)) {
                        m[y][x] = { type: 'brick', hp: WALL_HP };
                    }
                }
            }

            // Стальные блоки
            for (let y = 4; y < h - 4; y += 4) {
                for (let x = 4; x < w - 4; x += 4) {
                    m[y][x] = { type: 'steel', hp: 999 };
                }
            }

            return m;
        }

        function wallAt(x, y) {
            const tx = Math.floor(x / TILE);
            const ty = Math.floor(y / TILE);
            if (tx < 0 || ty < 0 || tx >= mapW || ty >= mapH) return true;
            return mapData[ty] && mapData[ty][tx] && mapData[ty][tx].type !== 'empty';
        }

        // ══════════════════════════════════════════
        // УТИЛИТЫ
        // ══════════════════════════════════════════
        function angDiff(a, b) {
            let d = a - b;
            while (d > Math.PI) d -= Math.PI * 2;
            while (d < -Math.PI) d += Math.PI * 2;
            return d;
        }

        function rr(c, x, y, w, h, r) {
            c.beginPath();
            c.moveTo(x + r, y);
            c.lineTo(x + w - r, y);
            c.arcTo(x + w, y, x + w, y + r, r);
            c.lineTo(x + w, y + h - r);
            c.arcTo(x + w, y + h, x + w - r, y + h, r);
            c.lineTo(x + r, y + h);
            c.arcTo(x, y + h, x, y + h - r, r);
            c.lineTo(x, y + r);
            c.arcTo(x, y, x + r, y, r);
            c.closePath();
        }

        function spawnP(x, y, color, n, speed, life, grav = 0) {
            for (let i = 0; i < n; i++) {

                });

        // ══════════════════════════════════════════
        // A* ДЛЯ БОТА
        // ══════════════════════════════════════════
        function findPath(sx, sy, ex, ey) {
            if (sx === ex && sy === ey) return null;

            const open = [{
                x: sx,
                y: sy,
                g: 0,
                h: Math.abs(sx - ex) + Math.abs(sy - ey),
                p: null
            }];

            const closed = new Set();
            const K = (x, y) => x + ',' + y;
            let iter = 0;

            while (open.length && iter++ < 300) {
                open.sort((a, b) => (a.g + a.h) - (b.g + b.h));
                const c = open.shift();

                if (c.x === ex && c.y === ey) {
                    const path = [];
                    let n = c;
                    while (n) {
                        path.unshift({ x: n.x, y: n.y });
                        n = n.p;
                    }
                    return path;
                }

                closed.add(K(c.x, c.y));

                for (const [dx, dy] of [
                        [1, 0],
                        [-1, 0],
                        [0, 1],
                        [0, -1]
                    ]) {
                    const nx = c.x + dx;
                    const ny = c.y + dy;

                    if (nx < 0 || ny < 0 || nx >= mapW || ny >= mapH || closed.has(K(nx, ny))) continue;
                    if (mapData[ny][nx].type !== 'empty') continue;

                    const g = c.g + 1;
                    const h = Math.abs(nx - ex) + Math.abs(ny - ey);
                    const ex2 = open.find(n => n.x === nx && n.y === ny);

                    if (!ex2) {
                        open.push({ x: nx, y: ny, g, h, p: c });
                    } else if (g < ex2.g) {
                        ex2.g = g;
                        ex2.p = c;
                    }
                }
            }
            return null;
        }

        // ══════════════════════════════════════════
        // КЛАСС ТАНКА
        // ══════════════════════════════════════════
        class Tank {
            constructor(x, y, col, acc, idx, bot = false) {
                this.x = x;
                this.y = y;
                this.angle = idx === 0 ? 0 : Math.PI;
                this.col = col;
                this.acc = acc;
                this.idx = idx;
                this.lives = MAX_LIVES;
                this.alive = true;
                this.spd = bot ? BOT_SPEED : TANK_SPEED;
                this.baseSpd = this.spd;
                this.scd = 0;
                this.srate = 0.48;
                this.bonus = null;
                this.bTimer = 0;
                this.shield = false;
                this.frozen = false;
                this.frozenT = 0;
                this.magnet = false;
                this.invisible = false;
                this.teleportReady = false;
                this.hitFlash = 0;
                this.respawning = false;
                this.respawnT = 0;
                this.kills = 0;
                this.shots = 0;
                this.tracks = [];
                this.trackT = 0;
                this.bot = bot;
                this.path = null;
                this.pathT = 0;
                this.botTarget = null;
                this.botState = 'hunt';
                this.dodgeAng = 0;
                this.dodgeT = 0;
            }

            applyBonus(type) {
                this.bonus = type;
                this.bTimer = BONUS_DUR;

                if (type === 'armor') {
                    this.shield = true;
                    this.spd = this.baseSpd * 0.55;
                } else if (type === 'speed') {
                    this.spd = this.baseSpd * 1.85;
                } else if (type === 'magnet') {
                    this.magnet = true;
                } else if (type === 'invisible') {
                    this.invisible = true;
                } else if (type === 'shield') {
                    this.shield = true;
                } else if (type === 'teleport') {
                    this.teleportReady = true;
                } else if (type === 'freeze') {
                    // Замораживаем всех противников
                    for (const t of tanks) {
                        if (t === this || !t.alive || t.respawning) continue;
                        t.frozen = true;
                        t.frozenT = 3.5;
                        spawnP(t.x, t.y, '#88ddff', 22, 100, 0.9);
                        spawnTxt(t.x, t.y - 32, '❄ ЗАМОРОЖЕН!', '#88ddff', 15);
                        snd_freeze();
                    }
                }

                snd_pickup();
                spawnP(this.x, this.y, B_COL[type], 28, 140, 0.7);
                spawnTxt(this.x, this.y - 32, '+' + B_NAME[type], B_COL[type], 15);
                updateBonusHUD(this.idx, type);
            }

            clearBonus() {
                this.bonus = null;
                this.shield = false;
                this.magnet = false;
                this.invisible = false;
                this.spd = this.baseSpd;
                updateBonusHUD(this.idx, null);
            }

            shoot() {
                if (this.scd > 0 || !this.alive || this.respawning || this.frozen) return;
                this.scd = this.srate;
                this.shots++;

                if (this.bonus === 'triple') {
                    [-0.3, 0, 0.3].forEach(a => spawnBullet(this, this.angle + a));
                    snd_shoot(false);
                } else if (this.bonus === 'laser') {
                    fireLaser(this);
                } else if (this.bonus === 'mine') {
                    layMine(this);
                } else {
                    spawnBullet(this, this.angle);
                    snd_shoot(false);
                }
            }

            tryMove(dx, dy) {
                const r = 18;
                const nx = this.x + dx;
                const ny = this.y + dy;
                const ok = (x, y) => !wallAt(x, y);

                if (ok(nx - r, ny - r) && ok(nx + r, ny - r) && ok(nx - r, ny + r) && ok(nx + r, ny + r)) {
                    this.x = nx;
                    this.y = ny;
                } else if (ok(nx - r, this.y - r) && ok(nx + r, this.y - r) && ok(nx - r, this.y + r) && ok(nx + r,
                        this.y + r)) {
                    this.x = nx;
                } else if (ok(this.x - r, ny - r) && ok(this.x + r, ny - r) && ok(this.x - r, ny + r) && ok(this.x + r,
                        ny + r)) {
                    this.y = ny;
                }
            }

            hit(dmg, from) {
                if (this.shield) {
                    spawnP(this.x, this.y, '#00ff44', 10, 90, 0.4);
                    snd_shield_hit();
                    return 'bounced';
                }

                this.hitFlash = 0.14;
                this.lives = Math.max(0, this.lives - dmg);
                spawnP(this.x, this.y, this.col, 16, 115, 0.65);
                updateLivesHUD();

                if (this.lives <= 0) {
                    this.die(from);
                    return 'dead';
                }
                return 'hit';
            }

            die(killer) {
                this.alive = false;
                if (killer) {
                    killer.kills++;
                    killCount[killer.idx]++;
                    spawnTxt(this.x, this.y - 44, 'БАБАХ!', '#ff4444', 22);
                }

                spawnP(this.x, this.y, this.col, 55, 210, 1.6, 35);
                spawnP(this.x, this.y, '#ff8800', 28, 155, 1.1, 22);
                spawnP(this.x, this.y, '#ffff00', 18, 110, 0.7, 10);
                snd_explode(true);
                shake(1.6);
                flash('#ff4400', 220);

                if (Math.random() < 0.55) spawnBonusAt(this.x, this.y);
                setTimeout(() => checkGameOver(), 60);
            }

            update(dt) {
                if (this.respawning) {
                    this.respawnT -= dt;
                    if (this.respawnT <= 0) {
                        this.respawning = false;
                        this.alive = true;
                    }
                    return;
                }

                if (!this.alive) return;

                if (this.scd > 0) this.scd -= dt;
                if (this.hitFlash > 0) this.hitFlash -= dt;

                // Заморозка
                if (this.frozen) {
                    this.frozenT -= dt;
                    if (this.frozenT <= 0) {
                        this.frozen = false;
                        spawnTxt(this.x, this.y - 30, 'РАЗМОРОЖЕН!', '#88ddff', 13);
                    }
                    return;
                }

                // Таймер бонуса
                if (this.bTimer > 0) {
                    this.bTimer -= dt * 1000;
                    if (this.bTimer <= 0) this.clearBonus();
                }

                // Телепорт
                if (this.teleportReady) {
                    this.teleportReady = false;
                    this.x = 2 * TILE + Math.random() * (mapW - 4) * TILE;
                    this.y = 2 * TILE + Math.random() * (mapH - 4) * TILE;
                    spawnP(this.x, this.y, '#ff8800', 30, 150, 0.8);
                }

                // Магнит
                if (this.magnet) {
                    for (const b of bonusItems) {
                        if (!b.alive) continue;
                        const dx = this.x - b.x;
                        const dy = this.y - b.y;
                        const d = Math.sqrt(dx * dx + dy * dy);
                        if (d < TILE * 6 && d > 2) {
                            b.x += (dx / d) * TILE * 2.8 * dt;
                            b.y += (dy / d) * TILE * 2.8 * dt;
                        }
                    }
                }

                // Следы гусениц
                this.trackT -= dt;
                if (this.trackT <= 0) {
                    this.trackT = 0.12;
                    this.tracks.push({
                        x: this.x,
                        y: this.y,
                        angle: this.angle,
                        life: 1.6
                    });
                    if (this.tracks.length > 28) this.tracks.shift();
                }

                for (const tr of this.tracks) tr.life -= dt;
                this.tracks = this.tracks.filter(t => t.life > 0);

                // AI для бота
                if (this.bot) this.updateBot(dt);
            }

            updateBot(dt) {
                const player = tanks.find(t => !t.bot && t.alive);
                if (!player) return;

                // Проверка угроз
                let threatened = false;

                // Проверка пуль
                for (const b of bullets) {
                    if (b.owner === this || !b.alive) continue;
                    const dx = this.x - b.x;
                    const dy = this.y - b.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < TILE * 3.5) {
                        const bdir = Math.atan2(b.vy, b.vx);
                        const tot = Math.atan2(dy, dx);
                        if (Math.abs(angDiff(bdir, tot)) < 0.45) {
                            threatened = true;
                            break;
                        }
                    }
                }

                // Проверка мин
                for (const m of mines) {
                    if (m.owner === this.idx) continue;
                    const dx = this.x - m.x;
                    const dy = this.y - m.y;
                    if (Math.sqrt(dx * dx + dy * dy) < TILE * 2.2) {
                        threatened = true;
                        break;
                    }
                }

                // Ближайший бонус
                const nearBonus = bonusItems.find(b => {
                    const dx = b.x - this.x;
                    const dy = b.y - this.y;
                    return Math.sqrt(dx * dx + dy * dy) < TILE * 6;
                });

                // Выбор состояния
                if (threatened && this.dodgeT <= 0) {
                    this.botState = 'dodge';
                    this.dodgeAng = this.angle + Math.PI * 0.5 * (Math.random() > 0.5 ? 1 : -1);
                    this.dodgeT = 0.55;
                } else if (nearBonus && !this.bonus) {
                    this.botState = 'grab_bonus';
                    this.botTarget = nearBonus;
                } else if (this.botState !== 'dodge') {
                    this.botState = 'hunt';
                }

                if (this.dodgeT > 0) {
                    this.dodgeT -= dt;
                    if (this.dodgeT <= 0) this.botState = 'hunt';
                }

                // Цель
                let targetX = player.x;
                let targetY = player.y;

                if (this.botState === 'grab_bonus' && this.botTarget && bonusItems.includes(this.botTarget)) {
                    targetX = this.botTarget.x;
                    targetY = this.botTarget.y;
                }

                // Построение пути
                this.pathT -= dt;
                if (this.pathT <= 0) {
                    this.pathT = 0.9;
                    this.path = findPath(
                        Math.floor(this.x / TILE),
                        Math.floor(this.y / TILE),
                        Math.floor(targetX / TILE),
                        Math.floor(targetY / TILE)
                    );
                }

                let moveAng = Math.atan2(targetY - this.y, targetX - this.x);

                if (this.path && this.path.length > 1) {
                    const nxt = this.path[1];
                    const nx = nxt.x * TILE + TILE / 2;
                    const ny = nxt.y * TILE + TILE / 2;
                    const dx = nx - this.x;
                    const dy = ny - this.y;
                    if (Math.sqrt(dx * dx + dy * dy) < TILE * 0.5) this.path.shift();
                    moveAng = Math.atan2(dy, dx);
                }

                if (this.botState === 'dodge') moveAng = this.dodgeAng;

                // Поворот и движение
                const da = angDiff(moveAng, this.angle);
                this.angle += Math.sign(da) * Math.min(Math.abs(da), 5 * dt);
                this.tryMove(Math.cos(this.angle) * this.spd * dt, Math.sin(this.angle) * this.spd * dt);

                // Стрельба
                const aimAng = Math.atan2(player.y - this.y, player.x - this.x);
                if (Math.abs(angDiff(this.angle, aimAng)) < 0.3 && player.alive) {
                    this.shoot();
                }
            }

            draw() {
                if (!this.alive && !this.respawning) return;

                // Следы гусениц
                for (const tr of this.tracks) {
                    if (tr.life <= 0) continue;
                    ctx.save();
                    ctx.globalAlpha = (tr.life / 1.6) * 0.22;
                    ctx.translate(tr.x, tr.y);
                    ctx.rotate(tr.angle);
                    ctx.fillStyle = '#223';
                    ctx.fillRect(-17, -13, 5, 26);
                    ctx.fillRect(12, -13, 5, 26);
                    ctx.restore();
                }

                const alpha = this.respawning ? (0.38 + 0.28 * Math.sin(Date.now() * 0.014)) : 1;

                // Невидимка
                if (this.invisible && alpha === 1) return;

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Вспышка при попадании
                if (this.hitFlash > 0) {
                    ctx.shadowColor = '#fff';
                    ctx.shadowBlur = 32;
                }

                // Щит
                if (this.shield && !this.invisible) {
                    ctx.shadowColor = '#00ff44';
                    ctx.shadowBlur = 22;
                    ctx.strokeStyle = 'rgba(0,255,68,0.6)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 29, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Корпус
                const bCol = this.frozen ? '#aaddff' : this.hitFlash > 0 ? '#ffffff' : this.col;
                ctx.fillStyle = bCol;
                ctx.shadowColor = bCol;
                ctx.shadowBlur = 10;
                rr(ctx, -20, -16, 40, 32, 5);
                ctx.fill();

                // Гусеницы
                ctx.fillStyle = 'rgba(0,0,0,0.38)';
                ctx.fillRect(-20, -16, 6, 32);
                ctx.fillRect(14, -16, 6, 32);
                ctx.fillStyle = 'rgba(255,255,255,0.09)';
                for (let i = 0; i < 5; i++) {
                    ctx.fillRect(-20, -14 + i * 7, 6, 3);
                    ctx.fillRect(14, -14 + i * 7, 6, 3);
                }

                // Башня
                ctx.fillStyle = this.acc;
                ctx.shadowColor = this.acc;
                ctx.shadowBlur = 7;
                ctx.beginPath();
                ctx.arc(0, 0, 11, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(9, -4, 22, 8);

                // Индикатор трипл-шота
                if (this.bonus === 'triple') {
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(9, -10, 16, 4);
                    ctx.fillRect(9, 6, 16, 4);
                }

                // Лёд при заморозке
                if (this.frozen) {
                    ctx.fillStyle = 'rgba(136,221,255,0.4)';
                    rr(ctx, -25, -20, 50, 40, 6);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // ══════════════════════════════════════════
        // ПУЛИ, ЛАЗЕР, МИНЫ
        // ══════════════════════════════════════════
        function spawnBullet(tank, angle) {
            bullets.push({
                x: tank.x + Math.cos(angle) * 35,
                y: tank.y + Math.sin(angle) * 35,
                vx: Math.cos(angle) * BULLET_SPEED,
                vy: Math.sin(angle) * BULLET_SPEED,
                owner: tank,
                alive: true,
                trail: [],
                age: 0
            });
        }

        function fireLaser(tank) {
            snd_shoot(true);
            flash('#ff00ff', 160);
            shake(1.1);

            const a = tank.angle;
            const dx = Math.cos(a);
            const dy = Math.sin(a);
            let x = tank.x + dx * 36;
            let y = tank.y + dy * 36;
            let dist = 0;
            const maxD = Math.max(mapW, mapH) * TILE;

            ctx.save();
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 9;
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 35;
            ctx.globalAlpha = 0.88;
            ctx.beginPath();
            ctx.moveTo(x, y);

            while (dist < maxD) {
                x += dx * TILE * 0.28;
                y += dy * TILE * 0.28;
                dist += TILE * 0.28;

                const tx = Math.floor(x / TILE);
                const ty = Math.floor(y / TILE);
                if (tx < 0 || ty < 0 || tx >= mapW || ty >= mapH) break;

                const cell = mapData[ty] && mapData[ty][tx];
                if (cell && cell.type === 'steel') break;
                if (cell && cell.type === 'brick') {
                    cell.hp -= 3;
                    if (cell.hp <= 0) cell.type = 'empty';
                    spawnP(tx * TILE + TILE / 2, ty * TILE + TILE / 2, '#cc8844', 8, 85, 0.4);
                    break;
                }

                // Попадание по танкам
                for (const t of tanks) {
                    if (t === tank || !t.alive || t.respawning) continue;
                    if (Math.hypot(t.x - x, t.y - y) < TILE) {
                        t.hit(2, tank);
                    }
                }
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.restore();

            spawnP(x, y, '#ff00ff', 22, 180, 0.9);
            spawnTxt(tank.x, tank.y - 42, '⚡ЛАЗЕР!', '#ff00ff', 18);
        }

        function layMine(tank) {
            const m = {
                x: tank.x,
                y: tank.y,
                owner: tank.idx,
                armed: false,
                armT: 1.5,
                alive: true,
                age: 0,
                blink: 0
            };
            mines.push(m);
            spawnTxt(tank.x, tank.y - 30, '💣 МИНА!', '#ff4444', 14);
        }

        function updateMines(dt) {
            for (const m of mines) {
                if (!m.alive) continue;
                m.age += dt;
                m.blink += dt;

                if (!m.armed) {
                    m.armT -= dt;
                    if (m.armT <= 0) m.armed = true;
                }

                if (m.armed) {
                    for (const t of tanks) {
                        if (t.idx === m.owner || !t.alive || t.respawning) continue;
                        if (Math.hypot(t.x - m.x, t.y - m.y) < 26) {
                            m.alive = false;
                            spawnP(m.x, m.y, '#ff4444', 44, 210, 1.3, 42);
                            spawnP(m.x, m.y, '#ffaa00', 22, 160, 0.85);
                            t.hit(2, tanks.find(tk => tk.idx === m.owner));
                            shake(1.3);
                            snd_explode(false);

                            // Разрушение стен
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    const tx = Math.floor(m.x / TILE) + dx;
                                    const ty = Math.floor(m.y / TILE) + dy;
                                    if (tx >= 0 && ty >= 0 && tx < mapW && ty < mapH &&
                                        mapData[ty] && mapData[ty][tx] && mapData[ty][tx].type === 'brick') {
                                        mapData[ty][tx].hp -= 2;
                                        if (mapData[ty][tx].hp <= 0) mapData[ty][tx].type = 'empty';
                                    }
                                }
                            }
                            break;
                        }
                    }
                }
                if (m.age > 16) m.alive = false;
            }
            mines = mines.filter(m => m.alive);
        }

        function drawMines() {
            for (const m of mines) {
                if (!m.alive) continue;
                const pulse = m.armed ? (0.65 + 0.35 * Math.sin(m.blink * 8)) : 0.5;
                ctx.save();
                ctx.globalAlpha = pulse;
                ctx.shadowColor = m.armed ? '#ff4444' : '#888';
                ctx.shadowBlur = m.armed ? 16 : 4;
                ctx.fillStyle = m.armed ? '#ff3333' : '#555';
                ctx.beginPath();
                ctx.arc(m.x, m.y, 9, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⬤', m.x, m.y);
                ctx.restore();
            }
        }

        // ══════════════════════════════════════════
        // БОНУСЫ
        // ══════════════════════════════════════════
        function spawnBonusAt(x, y) {
            const type = B_TYPES[Math.floor(Math.random() * B_TYPES.length)];
            bonusItems.push({
                x: x,
                y: y,
                type: type,
                age: 0,
                alive: true,
                bob: Math.random() * Math.PI * 2
            });
        }

        function spawnBonus() {
            let tries = 0;
            let bx, by;
            do {
                bx = 1 + Math.floor(Math.random() * (mapW - 2));
                by = 1 + Math.floor(Math.random() * (mapH - 2));
                tries++;
            } while (mapData[by] && mapData[by][bx] && mapData[by][bx].type !== 'empty' && tries < 80);

            if (tries >= 80) return;

            const type = B_TYPES[Math.floor(Math.random() * B_TYPES.length)];
            bonusItems.push({
                x: bx * TILE + TILE / 2,
                y: by * TILE + TILE / 2,
                type: type,
                age: 0,
                alive: true,
                bob: Math.random() * Math.PI * 2
            });
        }

        // ══════════════════════════════════════════
        // ДЖОЙСТИК
        // ══════════════════════════════════════════
        class Joystick {
            constructor(bx, by, r, type, pidx) {
                this.bx = bx;
                this.by = by;
                this.r = r;
                this.type = type;
                this.pidx = pidx;
                this.active = false;
                this.tid = null;
                this.sx = 0;
                this.sy = 0;
                this.dx = 0;
                this.dy = 0;
            }

            start(id, x, y) {
                this.active = true;
                this.tid = id;
                this.move(x, y);
            }

            move(x, y) {
                const dx = x - this.bx;
                const dy = y - this.by;
                const d = Math.sqrt(dx * dx + dy * dy);
                const mx = this.r * 0.68;

                if (d > mx) {
                    this.sx = (dx / d) * mx;
                    this.sy = (dy / d) * mx;
                } else {
                    this.sx = dx;
                    this.sy = dy;
                }

                this.dx = dx / this.r;
                this.dy = dy / this.r;
                const l = Math.sqrt(this.dx * this.dx + this.dy * this.dy);
                if (l > 1) {
                    this.dx /= l;
                    this.dy /= l;
                }
            }

            end() {
                this.active = false;
                this.tid = null;
                this.sx = 0;
                this.sy = 0;
                this.dx = 0;
                this.dy = 0;
            }

            draw() {
                const col = this.pidx === 0 ? '#00e5ff' : '#ff6b35';
                ctx.save();

                // Кольцо
                ctx.beginPath();
                ctx.arc(this.bx, this.by, this.r, 0, Math.PI * 2);
                ctx.strokeStyle = col + '55';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = col + '0d';
                ctx.fill();

                // Крест
                ctx.strokeStyle = col + '1a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.bx - this.r, this.by);
                ctx.lineTo(this.bx + this.r, this.by);
                ctx.moveTo(this.bx, this.by - this.r);
                ctx.lineTo(this.bx, this.by + this.r);
                ctx.stroke();

                // Ручка
                const sx = this.bx + this.sx;
                const sy = this.by + this.sy;
                ctx.beginPath();
                ctx.arc(sx, sy, this.r * 0.31, 0, Math.PI * 2);
                const g = ctx.createRadialGradient(sx, sy, 2, sx, sy, this.r * 0.31);
                g.addColorStop(0, col + (this.active ? 'ff' : '88'));
                g.addColorStop(1, col + (this.active ? '99' : '33'));
                ctx.fillStyle = g;
                ctx.fill();
                ctx.strokeStyle = col + (this.active ? 'cc' : '44');
                ctx.lineWidth = 2;
                ctx.stroke();

                // Иконка
                ctx.fillStyle = col + (this.active ? 'ff' : '77');
                ctx.font = `bold ${Math.round(this.r * 0.3)}px Courier New`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type === 'shoot' ? '🔥' : '✛', sx, sy);

                ctx.restore();
            }
        }

        // ══════════════════════════════════════════
        // HUD
        // ══════════════════════════════════════════
        function updateLivesHUD() {
            for (let i = 0; i < Math.min(tanks.length, 2); i++) {
                const el = document.getElementById('lives-p' + (i + 1));
                if (!el) continue;
                el.innerHTML = '';
                for (let l = 0; l < MAX_LIVES; l++) {
                    const d = document.createElement('div');
                    d.className = 'life-icon' + (i === 1 ? ' p2' : '') + (l < tanks[i].lives ? '' : ' lost');
                    el.appendChild(d);
                }
            }
        }

        function updateBonusHUD(idx, type) {
            const el = document.getElementById('bonus-p' + (idx + 1));
            if (!el) return;
            if (type) {
                el.style.display = 'inline-block';
                el.style.borderColor = B_COL[type];
                el.style.color = B_COL[type];
                el.textContent = B_SYM[type] + ' ' + B_NAME[type];
            } else {
                el.style.display = 'none';
            }
        }

        function updateTimer() {
            const s = Math.floor(gameTime);
            const m = Math.floor(s / 60);
            document.getElementById('hud-timer').textContent =
                String(m).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
        }

        // ══════════════════════════════════════════
        // ЗАПУСК ИГРЫ
        // ══════════════════════════════════════════
        function startGame(mode) {
            onlineMode = false;
            currentMode = mode;

            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('p2-name').textContent = mode === 1 ? 'BOT' : 'P2';

            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Горизонтальная карта
            mapW = Math.max(Math.floor(canvas.width / TILE), 10);
            mapH = Math.max(Math.floor(canvas.height / TILE), 6);
            if (mapW < mapH)[mapW, mapH] = [mapH, mapW];

            mapData = genMap(mapW, mapH);

            particles = [];
            bullets = [];
            bonusItems = [];
            tanks = [];
            mines = [];
            floatingTexts = [];
            weatherParts = [];
            killCount = [0, 0];
            gameTime = 0;
            shakeTimer = 0;
            weatherType = 'none';
            weatherTimer = 0;
            quakeTimer = 0;
            lastEventAt = 0;

            // Создаём танки
            const t1 = new Tank(TILE * 2.5, TILE * 2.5, '#00e5ff', '#0088cc', 0, false);
            tanks.push(t1);

            if (mode === 1) {
                // Бот
                const bot = new Tank((mapW - 3.5) * TILE, (mapH - 3.5) * TILE, '#ff6b35', '#cc3300', 1, true);
                bot.angle = Math.PI;
                tanks.push(bot);
            } else {
                // Второй игрок
                const t2 = new Tank((mapW - 3.5) * TILE, (mapH - 3.5) * TILE, '#ff6b35', '#cc3300', 1, false);
                t2.angle = Math.PI;
                tanks.push(t2);
            }

            updateLivesHUD();
            updateBonusHUD(0, null);
            updateBonusHUD(1, null);

            // Джойстики
            const jr = Math.min(58, canvas.width * 0.076);
            const jm = jr + 16;

            if (mode === 1) {
                joysticks = {
                    p1Move: new Joystick(jm, canvas.height - jm, jr, 'move', 0),
                    p1Shoot: new Joystick(canvas.width - jm, canvas.height - jm, jr, 'shoot', 0)
                };
            } else {
                joysticks = {
                    p1Move: new Joystick(jm, canvas.height - jm, jr, 'move', 0),
                    p1Shoot: new Joystick(jm + jr * 2.5, canvas.height - jm, jr * 0.8, 'shoot', 0),
                    p2Move: new Joystick(canvas.width - jm, canvas.height - jm, jr, 'move', 1),
                    p2Shoot: new Joystick(canvas.width - jm - jr * 2.5, canvas.height - jm, jr * 0.8, 'shoot', 1)
                };
            }

            bonusTimer = BONUS_INT;
            setupInput();

            gameState = 'countdown';
            doCountdown(() => {
                gameState = 'playing';
                lastTime = performance.now();
                if (animFrame) cancelAnimationFrame(animFrame);
                gameLoop(lastTime);
            });
        }

        function startOnlineGame() {
            startGame(1);
        }

        function doCountdown(cb) {
            const n = ['3', '2', '1', 'GO!'];
            let i = 0;
            const el = document.getElementById('countdown');
            const nm = document.getElementById('cnum');
            el.style.display = 'flex';

            const s = () => {
                if (i >= n.length) {
                    el.style.display = 'none';
                    cb();
                    return;
                }
                nm.textContent = n[i];
                nm.style.color = n[i] === 'GO!' ? '#00ff88' : '#ffffff';
                nm.style.animation = 'none';
                void nm.offsetWidth;
                nm.style.animation = 'cpop .9s ease';
                snd_countdown(n[i] === 'GO!');
                i++;
                setTimeout(s, 900);
            };
            s();
        }

        // ══════════════════════════════════════════
        // ВВОД
        // ══════════════════════════════════════════
        function setupInput() {
            canvas.ontouchstart = e => {
                e.preventDefault();
                for (const t of e.changedTouches) {
                    const x = t.clientX;
                    const y = t.clientY;
                    let hit = false;
                    for (const j of Object.values(joysticks)) {
                        if (j.active) continue;
                        if (Math.hypot(x - j.bx, y - j.by) < j.r * 1.7) {
                            j.start(t.identifier, x, y);
                            hit = true;
                            break;
                        }
                    }
                    if (!hit && tanks[0]?.alive) tanks[0].shoot();
                }
            };

            canvas.ontouchmove = e => {
                e.preventDefault();
                for (const t of e.changedTouches) {
                    for (const j of Object.values(joysticks)) {
                        if (j.tid === t.identifier) j.move(t.clientX, t.clientY);
                    }
                }
            };

            canvas.ontouchend = canvas.ontouchcancel = e => {
                e.preventDefault();
                for (const t of e.changedTouches) {
                    for (const j of Object.values(joysticks)) {
                        if (j.tid !== t.identifier) continue;
                        if (j.type === 'shoot' && j.active && tanks[j.pidx]?.alive) {
                            tanks[j.pidx].shoot();
                        }
                        j.end();
                    }
                }
            };

            const keys = {};
            window.onkeydown = e => { keys[e.key] = true; };
            window.onkeyup = e => { keys[e.key] = false; };
            window._keys = keys;
        }

        // ══════════════════════════════════════════
        // ИГРОВОЙ ЦИКЛ
        // ══════════════════════════════════════════
        function gameLoop(ts) {
            if (gameState !== 'playing') return;
            animFrame = requestAnimationFrame(gameLoop);
            const dt = Math.min((ts - lastTime) / 1000, 0.05);
            lastTime = ts;
            update(dt);
            render();
        }

        function update(dt) {
            gameTime += dt;
            updateTimer();

            const keys = window._keys || {};

            // Управление P1 (клавиатура)
            if (tanks[0]?.alive && !tanks[0].respawning && !tanks[0].frozen) {
                let kx = 0,
                    ky = 0;
                if (keys['a'] || keys['ArrowLeft']) kx = -1;
                if (keys['d'] || keys['ArrowRight']) kx = 1;
                if (keys['w'] || keys['ArrowUp']) ky = -1;
                if (keys['s'] || keys['ArrowDown']) ky = 1;
                if (kx || ky) {
                    tanks[0].angle = Math.atan2(ky, kx);
                    tanks[0].tryMove(
                        Math.cos(tanks[0].angle) * tanks[0].spd * dt,
                        Math.sin(tanks[0].angle) * tanks[0].spd * dt
                    );
                }
                if (keys[' '] || keys['Enter']) tanks[0].shoot();
            }

            // Управление P2 (клавиатура, локальный режим)
            if (!onlineMode && currentMode === 2 && tanks[1]?.alive && !tanks[1].respawning && !tanks[1].frozen) {
                let kx = 0,
                    ky = 0;
                if (keys['j']) kx = -1;
                if (keys['l']) kx = 1;
                if (keys['i']) ky = -1;
                if (keys['k']) ky = 1;
                if (kx || ky) {
                    tanks[1].angle = Math.atan2(ky, kx);
                    tanks[1].tryMove(
                        Math.cos(tanks[1].angle) * tanks[1].spd * dt,
                        Math.sin(tanks[1].angle) * tanks[1].spd * dt
                    );
                }
                if (keys['u'] || keys['o']) tanks[1].shoot();
            }

            // Джойстики
            applyJoy(0, dt);
            if (!onlineMode && currentMode === 2) applyJoy(1, dt);

            // Обновление танков
            for (const t of tanks) t.update(dt);

            // Обновление пуль
            for (const b of bullets) {
                if (!b.alive) continue;
                b.trail.push({ x: b.x, y: b.y });
                if (b.trail.length > 8) b.trail.shift();
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                b.age += dt;

                if (b.age > 4.5) {
                    b.alive = false;
                    continue;
                }

                const tx = Math.floor(b.x / TILE);
                const ty = Math.floor(b.y / TILE);
                if (tx < 0 || ty < 0 || tx >= mapW || ty >= mapH) {
                    b.alive = false;
                    continue;
                }

                const cell = mapData[ty] && mapData[ty][tx];
                if (cell && cell.type === 'steel') {
                    spawnP(b.x, b.y, '#99aabb', 6, 60, 0.22);
                    b.alive = false;
                } else if (cell && cell.type === 'brick') {
                    cell.hp--;
                    if (cell.hp <= 0) cell.type = 'empty';
                    spawnP(b.x, b.y, '#cc8844', 7, 70, 0.32);
                    b.alive = false;
                }

                if (!b.alive) continue;

                // Попадание в танк
                for (const t of tanks) {
                    if (t === b.owner || !t.alive || t.respawning) continue;
                    if (Math.hypot(b.x - t.x, b.y - t.y) < 22) {
                        const res = t.hit(1, b.owner);
                        if (res === 'bounced') {
                            b.vx = -b.vx;
                            b.vy = -b.vy;
                            b.owner = t;
                        } else {
                            b.alive = false;
                        }
                        break;
                    }
                }
            }
            bullets = bullets.filter(b => b.alive);

            // Бонусы
            for (const bo of bonusItems) {
                if (!bo.alive) continue;
                bo.age += dt;
                bo.bob += dt;

                for (const t of tanks) {
                    if (!t.alive || t.respawning) continue;
                    if (Math.hypot(bo.x - t.x, bo.y - t.y) < TILE * 0.88) {
                        t.applyBonus(bo.type);
                        bo.alive = false;
                        break;
                    }
                }
                if (bo.age > 14) bo.alive = false;
            }
            bonusItems = bonusItems.filter(b => b.alive);

            // Спавн бонусов
            bonusTimer -= dt * 1000;
            if (bonusTimer <= 0) {
                spawnBonus();
                bonusTimer = BONUS_INT;
            }

            // Мины
            updateMines(dt);

            // Тряска экрана
            if (shakeTimer > 0) {
                shakeTimer -= dt;
                const s = shakeTimer * 8;
                canvas.style.transform =
                    `translate(${(Math.random() - 0.5) * s}px, ${(Math.random() - 0.5) * s}px)`;
                if (shakeTimer <= 0) canvas.style.transform = '';
            }

            // Плавающий текст
            for (const ft of floatingTexts) {
                ft.y += ft.vy * dt;
                ft.life -= dt;
            }
            floatingTexts = floatingTexts.filter(f => f.life > 0);

            // Частицы
            for (const p of particles) {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vx *= 0.93;
                p.vy *= 0.93;
                p.vy += p.grav * dt;
                p.life -= dt;
            }
            particles = particles.filter(p => p.life > 0);
        }

        function applyJoy(pidx, dt) {
            const t = tanks[pidx];
            if (!t || !t.alive || t.respawning || t.bot || t.frozen) return;
            const mj = joysticks['p' + (pidx + 1) + 'Move'];
            const sj = joysticks['p' + (pidx + 1) + 'Shoot'];
            if (mj?.active && (Math.abs(mj.dx) > 0.07 || Math.abs(mj.dy) > 0.07)) {
                t.angle = Math.atan2(mj.dy, mj.dx);
                t.tryMove(
                    Math.cos(t.angle) * t.spd * Math.hypot(mj.dx, mj.dy) * dt,
                    Math.sin(t.angle) * t.spd * Math.hypot(mj.dx, mj.dy) * dt
                );
            }
            if (sj?.active) t.shoot();
        }

        // ══════════════════════════════════════════
        // ОТРИСОВКА
        // ══════════════════════════════════════════
        function render() {
            const W = canvas.width;
            const H = canvas.height;

            // Фон
            ctx.fillStyle = '#060810';
            ctx.fillRect(0, 0, W, H);

            // Сетка
            ctx.strokeStyle = '#0b1420';
            ctx.lineWidth = 0.5;
            for (let x = 0; x < W; x += TILE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y < H; y += TILE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // Тайлы карты
            for (let y = 0; y < mapH; y++) {
                for (let x = 0; x < mapW; x++) {
                    const cell = mapData[y] && mapData[y][x];
                    if (!cell || cell.type === 'empty') continue;

                    const px = x * TILE;
                    const py = y * TILE;

                    if (cell.type === 'steel') {
                        // Стальная стена
                        const g = ctx.createLinearGradient(px, py, px + TILE, py + TILE);
                        g.addColorStop(0, '#2a3f5a');
                        g.addColorStop(0.5, '#1e3050');
                        g.addColorStop(1, '#152338');
                        ctx.fillStyle = g;
                        ctx.fillRect(px, py, TILE, TILE);

                        ctx.strokeStyle = '#3d5a80';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(px + 1, py + 1, TILE - 2, TILE - 2);

                        // Болты
                        ctx.fillStyle = '#4a6d99';
                        ctx.fillRect(px + 2, py + 2, 6, 6);
                        ctx.fillRect(px + TILE - 8, py + 2, 6, 6);
                        ctx.fillRect(px + 2, py + TILE - 8, 6, 6);
                        ctx.fillRect(px + TILE - 8, py + TILE - 8, 6, 6);

                        // Диагонали
                        ctx.strokeStyle = '#5a80b0';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + 8, py + 8);
                        ctx.moveTo(px + TILE, py);
                        ctx.lineTo(px + TILE - 8, py + 8);
                        ctx.moveTo(px, py + TILE);
                        ctx.lineTo(px + 8, py + TILE - 8);
                        ctx.moveTo(px + TILE, py + TILE);
                        ctx.lineTo(px + TILE - 8, py + TILE - 8);
                        ctx.stroke();

                    } else if (cell.type === 'brick') {
                        // Кирпичная стена
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(px, py, TILE, TILE);

                        // Горизонтальные линии
                        for (let r = 0; r < 3; r++) {
                            ctx.fillStyle = '#a0522d';
                            ctx.fillRect(px + 1, py + r * 16 + 1, TILE - 2, 6);
                            ctx.fillStyle = '#723c0a';
                            ctx.fillRect(px + 1, py + r * 16 + 7, TILE - 2, 2);
                        }

                        // Блик
                        ctx.fillStyle = 'rgba(255,255,255,0.05)';
                        ctx.fillRect(px, py, TILE, 4);
                        ctx.fillStyle = 'rgba(0,0,0,0.3)';
                        ctx.fillRect(px, py + TILE - 4, TILE, 4);

                        // Трещины если повреждена
                        if (cell.hp < WALL_HP) {
                            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.moveTo(px + 10, py + 8);
                            ctx.lineTo(px + 26, py + 32);
                            ctx.moveTo(px + 30, py + 10);
                            ctx.lineTo(px + 14, py + 36);
                            ctx.stroke();
                        }
                    }
                }
            }

            // Бонусы
            for (const b of bonusItems) {
                if (!b.alive) continue;
                const bob = Math.sin(b.bob * 3) * 4;
                const pulse = Math.sin(b.bob * 5) * 0.18 + 0.82;
                ctx.save();
                ctx.globalAlpha = pulse;
                ctx.translate(b.x, b.y + bob);
                ctx.rotate(b.bob * 1.4);
                ctx.shadowColor = B_COL[b.type];
                ctx.shadowBlur = 28;
                const g = ctx.createRadialGradient(0, 0, 3, 0, 0, 17);
                g.addColorStop(0, B_COL[b.type]);
                g.addColorStop(1, B_COL[b.type] + '44');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(0, 0, 17, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(B_SYM[b.type], 0, 0);
                ctx.restore();
            }

            // Мины
            drawMines();

            // Пули
            for (const b of bullets) {
                if (!b.alive) continue;
                // След
                for (let i = 0; i < b.trail.length; i++) {
                    ctx.globalAlpha = (i / b.trail.length) * 0.45;
                    ctx.fillStyle = '#ffee44';
                    ctx.beginPath();
                    ctx.arc(b.trail[i].x, b.trail[i].y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Сама пуля
                ctx.globalAlpha = 1;
                ctx.shadowColor = '#ffcc00';
                ctx.shadowBlur = 14;
                ctx.fillStyle = '#ffff99';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Танки
            for (const t of tanks) t.draw();

            // Частицы
            for (const p of particles) {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 5;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // Плавающий текст
            for (const ft of floatingTexts) {
                ctx.save();
                ctx.globalAlpha = Math.min(1, (ft.life / ft.maxLife) * 2.2);
                ctx.fillStyle = ft.col;
                ctx.shadowColor = ft.col;
                ctx.shadowBlur = 14;
                ctx.font = `bold ${ft.sz}px Courier New`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(ft.txt, ft.x, ft.y);
                ctx.restore();
            }

            // Джойстики
            for (const j of Object.values(joysticks)) j.draw();

            // Индикатор бонуса
            const stb = Math.ceil(bonusTimer / 1000);
            if (stb <= 5) {
                ctx.save();
                ctx.fillStyle = `rgba(255,215,0,${0.5 + 0.4 * Math.sin(Date.now() * 0.012)})`;
                ctx.font = 'bold 11px Courier New';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(`🎁 БОНУС ЧЕРЕЗ ${stb}с`, W / 2, 48);
                ctx.restore();
            }
        }

        // ══════════════════════════════════════════
        // КОНЕЦ ИГРЫ / МЕНЮ
        // ══════════════════════════════════════════
        function checkGameOver() {
            const alive = tanks.filter(t => t.lives > 0);
            if (alive.length > 1) return;

            gameState = 'over';
            document.getElementById('game-over-screen').style.display = 'flex';

            const wt = document.getElementById('winner-text');
            if (alive[0]) {
                wt.textContent = alive[0].bot ? '🤖 БОТ ПОБЕДИЛ!' : '🏆 ПОБЕДА!';
            } else {
                wt.textContent = '🤝 НИЧЬЯ!';
            }
        }

        function showMenu() {
            gameState = 'menu';
            canvas.style.transform = '';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('countdown').style.display = 'none';
            if (animFrame) cancelAnimationFrame(animFrame);
        }

        function restartGame() {
            startGame(currentMode);
        }

        // Ресайз
        window.addEventListener('resize', () => {
            if ((gameState === 'playing' || gameState === 'over') && canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
